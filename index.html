<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Puzzle Co-op Fofinho</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        /* ESTILOS COMPLETOS */
        * { box-sizing: border-box; font-family: 'VT323', monospace; font-size: 24px; image-rendering: pixelated; }
        body { background-color: #1a1a24; background-image: radial-gradient(#252530 20%, transparent 20%), radial-gradient(#252530 20%, transparent 20%); background-size: 16px 16px; background-position: 0 0, 8px 8px; color: #ecf0f1; margin: 0; padding: 8px; display: flex; justify-content: center; min-height: 100vh; }
        #game-container { width: 100%; max-width: 480px; text-align: center; }
        h1 { font-size: 40px; color: #f1c40f; text-shadow: 3px 3px #000; margin: 10px 0; }
        
        .pixel-window { background-color: rgba(30, 30, 38, 0.95); border: 4px solid #3a3a4a; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .pixel-btn { background-color: #e67e22; border: 4px solid #d35400; color: white; padding: 15px; cursor: pointer; border-radius: 8px; width: 100%; font-size: 24px; margin-bottom: 10px; }
        
        /* ENCAIXE DE QUEBRA-CABEÇA (CLIP-PATH) */
        .puzzle-piece, .grid-slot {
            clip-path: path('M 0 0 H 25 C 25 25 75 25 75 0 H 100 V 25 C 75 25 75 75 100 75 V 100 H 75 C 75 75 25 75 25 100 H 0 V 75 C 25 75 25 25 0 25 Z');
            width: 80px; height: 80px;
        }
        
        #puzzle-grid { display: grid; grid-template-columns: repeat(4, 80px); gap: 2px; justify-content: center; margin: 20px auto; border: 6px solid #3a3a4a; background: #111; padding: 10px; }
        .grid-slot { background-color: rgba(255,255,255,0.05); }
        .puzzle-piece { cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: transform 0.2s; }
        .puzzle-piece.selecionada { outline: 4px solid #f1c40f; transform: scale(1.1); z-index: 10; }
        
        #pieces-container { display: flex; overflow-x: auto; gap: 10px; padding: 10px; background: rgba(0,0,0,0.3); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>PIXEL PUZZLE 🐾</h1>
    <div id="lobby-screen" class="pixel-window">
        <button class="pixel-btn" id="btn-player1">ENTRAR COMO ELE 🧔</button>
        <button class="pixel-btn" id="btn-player2" style="background:#d81b60; border-color:#ad1457;">ENTRAR COMO ELA 👩‍🦰</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="pieces-container"></div>
        <div id="puzzle-grid"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getDatabase, ref, get, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://dddua-81207-default-rtdb.firebaseio.com" }));
    
    // AS 50 IMAGENS DE ANIMAIS FOFOS
    const ListaImagens = [
        "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba", "https://images.unsplash.com/photo-1543466835-00a7907e9de1", "https://images.unsplash.com/photo-1537151608828-ea2b11777ee8", "https://images.unsplash.com/photo-1573865526739-10659fec78a5", "https://images.unsplash.com/photo-1592194996308-7b43878e84a6",
        "https://images.unsplash.com/photo-1583511655857-d19b40a7a54e", "https://images.unsplash.com/photo-1507146426996-ef05306b995a", "https://images.unsplash.com/photo-1548199973-03cce0bbc87b", "https://images.unsplash.com/photo-1561037404-61cd46aa615b", "https://images.unsplash.com/photo-1517849845537-4d257902454a",
        "https://images.unsplash.com/photo-1555685812-4b943f1cb079", "https://images.unsplash.com/photo-1533738363-b7f9aef128ce", "https://images.unsplash.com/photo-1518796774908-746df7083aa0", "https://images.unsplash.com/photo-1472491235688-bdc81a63246e", "https://images.unsplash.com/photo-1526336024174-e58f5c38e36b",
        "https://images.unsplash.com/photo-1531828421132-2d1490956272", "https://images.unsplash.com/photo-1559281358-86d34e9e09d1", "https://images.unsplash.com/photo-1513245543132-31f507417b26", "https://images.unsplash.com/photo-1495360010541-f48722b34f7d", "https://images.unsplash.com/photo-1527380907441-21391589139a",
        "https://images.unsplash.com/photo-1546182990-dffe07c4eb7d", "https://images.unsplash.com/photo-1552053831-71594a27632d", "https://images.unsplash.com/photo-1581888227599-779811939961", "https://images.unsplash.com/photo-1519052524668-07386d3c8c2e", "https://images.unsplash.com/photo-1557431356-618d363544e6",
        "https://images.unsplash.com/photo-1520038410233-7121be7ce9f3", "https://images.unsplash.com/photo-1535268647677-300dbf3d78d1", "https://images.unsplash.com/photo-1560114928-40f1f1bea26a", "https://images.unsplash.com/photo-1533743983669-94fa5c6338dd", "https://images.unsplash.com/photo-1522276498395-f4f68f7f8454",
        "https://images.unsplash.com/photo-1589656966895-2f33e7653819", "https://images.unsplash.com/photo-1565464027194-7956a2390620", "https://images.unsplash.com/photo-1516734212186-a967f81ad0d7", "https://images.unsplash.com/photo-1541781774459-bb2af2f05b55", "https://images.unsplash.com/photo-1591871937573-74bcba2d52e7",
        "https://images.unsplash.com/photo-1574144611937-087093258c73", "https://images.unsplash.com/photo-1598133894008-61f7fdb8cc3a", "https://images.unsplash.com/photo-1583337130417-3346a1be7dee", "https://images.unsplash.com/photo-1596854407944-bf87f6f775e2", "https://images.unsplash.com/photo-1556598379-37f078d10b77",
        "https://images.unsplash.com/photo-1611267254323-4db7b39c732c", "https://images.unsplash.com/photo-1606220838348-73595b8d277d", "https://images.unsplash.com/photo-1601758228041-f3b2795255f1", "https://images.unsplash.com/photo-1602584329649-6f920257366c", "https://images.unsplash.com/photo-1602491960533-87b64082c5f1",
        "https://images.unsplash.com/photo-1606813907291-d86eba9b24db", "https://images.unsplash.com/photo-1614680376593-902f74cf0d41", "https://images.unsplash.com/photo-1600880292203-757bb62b4baf", "https://images.unsplash.com/photo-1613369462372-f6735e806546", "https://images.unsplash.com/photo-1591160690555-5debfba289f0"
    ];

    let pSelec = null;
    const entrar = async () => {
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        const snap = await get(ref(db, 'partida'));
        if (!snap.exists()) {
            await set(ref(db, 'partida'), { img: ListaImagens[Math.floor(Math.random()*50)], encaixadas: {} });
        }
        onValue(ref(db, 'partida'), (s) => {
            const data = s.val();
            const grid = document.getElementById('puzzle-grid');
            const cont = document.getElementById('pieces-container');
            grid.innerHTML = ""; cont.innerHTML = "";
            for(let i=0; i<16; i++) {
                const slot = document.createElement('div'); slot.className = 'grid-slot';
                slot.onclick = () => { if(pSelec === i) update(ref(db, 'partida/encaixadas'), {[i]: true}); };
                if(data.encaixadas[i]) {
                    const p = document.createElement('div'); p.className = 'puzzle-piece';
                    p.style.backgroundImage = `url(${data.img})`;
                    p.style.backgroundPosition = `${(i%4)*33}% ${Math.floor(i/4)*33}%`;
                    slot.appendChild(p);
                } else {
                    const p = document.createElement('div'); p.className = 'puzzle-piece';
                    p.style.backgroundImage = `url(${data.img})`;
                    p.style.backgroundPosition = `${(i%4)*33}% ${Math.floor(i/4)*33}%`;
                    p.onclick = () => { pSelec = i; document.querySelectorAll('.puzzle-piece').forEach(el=>el.classList.remove('selecionada')); p.classList.add('selecionada'); };
                    cont.appendChild(p);
                }
                grid.appendChild(slot);
            }
        });
    };
    document.getElementById('btn-player1').onclick = entrar;
    document.getElementById('btn-player2').onclick = entrar;
</script>
</body>
</html>
