<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Pandinha Virtual 🐼</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #1a1a24; color: white; padding: 20px; }
        #panda-img { width: 250px; margin: 20px; border-radius: 50%; border: 5px solid #fff; }
        .stats { font-size: 1.5em; margin: 20px; }
        button { padding: 15px 25px; margin: 5px; cursor: pointer; font-size: 18px; border-radius: 10px; border: none; background: #e67e22; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Quem está entrando?</h1>
        <button onclick="entrar('Ele')">Entrar como Ele 🧔</button>
        <button onclick="entrar('Ela')">Entrar como Ela 👩‍🦰</button>
    </div>

    <div id="pet-area" class="hidden">
        <h1 id="boas-vindas">Nosso Pandinha</h1>
        <img id="panda-img" src="panda_normal.png" alt="Pandinha">
        <div class="stats">
            Energia: <span id="energia">100</span>% | Amor: <span id="amor">100</span>%
        </div>
        <div class="menu">
            <button onclick="acao('alimentar')">Dar Bambu 🎋</button>
            <button onclick="acao('limpar')">Dar Banho 🚿</button>
            <button onclick="acao('brincar')">Brincar 🎮</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

        // Credenciais integradas conforme solicitado
        const firebaseConfig = {
            apiKey: "AIzaSyBTmhs9bZp-IuBzqwTxQZlrHu9IHsDmJQA",
            authDomain: "dddua-81207.firebaseapp.com",
            databaseURL: "https://dddua-81207-default-rtdb.firebaseio.com",
            projectId: "dddua-81207",
            storageBucket: "dddua-81207.firebasestorage.app",
            messagingSenderId: "844138746278",
            appId: "1:844138746278:web:341f704f22c106473d7f67",
            measurementId: "G-F4SC83V4KB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const petRef = ref(db, 'pandinha_do_casal');

        window.entrar = (nome) => {
            document.getElementById('boas-vindas').innerText = "Olá, " + nome + "!";
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('pet-area').classList.remove('hidden');
        };

        window.acao = (tipo) => {
            let updates = {};
            if(tipo === 'alimentar') updates['energia'] = 100;
            update(petRef, updates);
        };

        onValue(petRef, (snapshot) => {
            const dados = snapshot.val();
            if(dados) {
                document.getElementById('energia').innerText = dados.energia || 100;
                document.getElementById('amor').innerText = dados.amor || 100;
            }
        });
    </script>
</body>
</html>
