<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Puzzle Co-op Fofinho</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; font-family: 'VT323', monospace; font-size: 24px; image-rendering: pixelated; }
        body { background-color: #1a1a24; background-image: radial-gradient(#252530 20%, transparent 20%), radial-gradient(#252530 20%, transparent 20%); background-size: 16px 16px; background-position: 0 0, 8px 8px; color: #ecf0f1; margin: 0; padding: 8px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; overflow-x: hidden; }
        #game-container { width: 100%; max-width: 480px; text-align: center; }
        h1 { font-size: 42px; color: #f1c40f; text-shadow: 3px 3px #000; margin: 5px 0; }
        h2 { font-size: 32px; color: #f39c12; margin: 0 0 10px 0; }
        .pixel-window { background-color: rgba(30, 30, 38, 0.95); border: 4px solid #3a3a4a; padding: 15px; box-shadow: 0px 5px 0px #111; margin-bottom: 15px; border-radius: 12px; }
        .pixel-box { background: #16a085; padding: 6px 15px; border: 4px solid #117a65; display: inline-block; margin-bottom: 15px; color: white; border-radius: 8px; width: 100%; }
        .setup-container { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .identity-container { display: flex; gap: 15px; width: 100%; }
        .pixel-btn { background-color: #e67e22; border: 4px solid #d35400; color: white; padding: 10px 20px; cursor: pointer; box-shadow: 0px 4px 0px #000; font-size: 26px; border-radius: 8px; flex: 1; }
        .pixel-btn.blue { background-color: #2980b9; border-color: #1f618d; }
        .pixel-btn.pink { background-color: #d81b60; border-color: #ad1457; }
        .pixel-btn:active { transform: translateY(2px); box-shadow: 0px 2px 0px #000; }
        .pixel-input { background-color: #ecf0f1; border: 4px solid #bdc3c7; color: #2c3e50; padding: 8px; text-align: center; font-size: 24px; width: 100%; border-radius: 8px; }
        #board-layout { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        #pieces-bank { width: 100%; padding: 10px; background-color: rgba(20, 20, 28, 0.95); }
        #pieces-container { display: flex; flex-direction: row; overflow-x: auto; scroll-snap-type: x proximity; gap: 10px; padding: 10px 5px; width: 100%; -webkit-overflow-scrolling: touch; }
        #puzzle-grid { width: 100%; max-width: 400px; height: 400px; background-color: #111; display: grid; padding: 0; gap: 2px; border: 6px solid #3a3a4a; position: relative; margin: 0 auto; }
        .grid-slot { position: relative; background-color: rgba(255, 255, 255, 0.03); border: 1px dashed rgba(255, 255, 255, 0.15); }
        
        /* NOVO ESTILO DE ENCAIXE COM CLIP-PATH */
        .puzzle-piece-wrapper { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .puzzle-piece { width: 100%; height: 100%; background-repeat: no-repeat; clip-path: polygon(0% 0%, 30% 0%, 30% 15%, 70% 15%, 70% 0%, 100% 0%, 100% 30%, 85% 30%, 85% 70%, 100% 70%, 100% 100%, 70% 100%, 70% 85%, 30% 85%, 30% 100%, 0% 100%, 0% 70%, 15% 70%, 15% 30%, 0% 30%); }
        #pieces-container .puzzle-piece-wrapper { position: relative; width: 75px; height: 75px; flex-shrink: 0; border: 3px solid #555; border-radius: 6px; scroll-snap-align: start; }
        .puzzle-piece.selecionada { outline: 4px solid #f1c40f; box-shadow: 0 0 12px #f1c40f; transform: scale(0.95); z-index: 10; }
        
        #turn-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20, 20, 30, 0.85); backdrop-filter: blur(2px); display: flex; justify-content: center; align-items: center; z-index: 10; }
        .overlay-text { background-color: #c0392b; border: 4px solid #922b21; padding: 12px 24px; color: white; font-size: 26px; box-shadow: 0px 4px 0px #000; border-radius: 8px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <header>
            <h1>PIXEL PUZZLE CO-OP 🐾</h1>
            <div id="turn-indicator" class="pixel-box">Identifique-se para jogar!</div>
        </header>

        <div id="lobby-screen" class="pixel-window">
            <h2>Quem está jogando?</h2>
            <div class="setup-container">
                <select id="select-difficulty" class="pixel-input">
                    <option value="facil">Fácil (16 Peças)</option>
                    <option value="medio">Médio (25 Peças)</option>
                    <option value="dificil">Difícil (36 Peças)</option>
                </select>
                <div class="identity-container">
                    <button class="pixel-btn blue" data-player="player_1">O ELE 🧔</button>
                    <button class="pixel-btn pink" data-player="player_2">A ELA 👩‍🦰</button>
                </div>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <div id="room-info" class="pixel-window" style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
                <span>Modo: <strong id="display-difficulty">Fácil</strong></span>
                <button id="btn-reset-game" class="pixel-btn" style="font-size:18px; padding:4px 12px; background-color:#d35400;">🔄</button>
            </div>
            <div id="board-layout">
                <div id="pieces-bank" class="pixel-window">
                    <div id="pieces-container"></div>
                </div>
                <div id="puzzle-board-wrapper">
                    <div id="puzzle-grid"></div>
                    <div id="turn-overlay" class="hidden"><div class="overlay-text" id="overlay-message">AGUARDANDO...</div></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBTmhs9bZp-IuBzqwTxQZlrHu9IHsDmJQA", authDomain: "dddua-81207.firebaseapp.com", databaseURL: "https://dddua-81207-default-rtdb.firebaseio.com", projectId: "dddua-81207", storageBucket: "dddua-81207.firebasestorage.app", messagingSenderId: "844138746278", appId: "1:844138746278:web:341f704f22c106473d7f67" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const NOSSA_SALA_FIXA = "PARTIDA_COOP_FOFURA";
        const ListaCemImagens = [
            "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba","https://images.unsplash.com/photo-1543466835-00a7907e9de1","https://images.unsplash.com/photo-1537151608828-ea2b11777ee8","https://images.unsplash.com/photo-1573865526739-10659fec78a5","https://images.unsplash.com/photo-1592194996308-7b43878e84a6","https://images.unsplash.com/photo-1583511655857-d19b40a7a54e","https://images.unsplash.com/photo-1507146426996-ef05306b995a","https://images.unsplash.com/photo-1548199973-03cce0bbc87b","https://images.unsplash.com/photo-1561037404-61cd46aa615b","https://images.unsplash.com/photo-1517849845537-4d257902454a","https://images.unsplash.com/photo-1533738363-b7f9aef128ce","https://images.unsplash.com/photo-1526336024174-e58f5cdd8e13","https://images.unsplash.com/photo-1546238232-2c2b0e4f1345","https://images.unsplash.com/photo-1552053831-71594a27632d","https://images.unsplash.com/photo-1555685812-4b743f140685","https://images.unsplash.com/photo-1495360010541-f48722b34f7d","https://images.unsplash.com/photo-1518791841217-8f162f1e1131","https://images.unsplash.com/photo-1513245543132-31f507417b26","https://images.unsplash.com/photo-1520763185298-1b434c919102","https://images.unsplash.com/photo-1511044568932-338cba0ad839","https://images.unsplash.com/photo-1541364983171-a8ba01e95cfc","https://images.unsplash.com/photo-1589656966895-2f33e7653819","https://images.unsplash.com/photo-1559484795-236b2f4f2590","https://images.unsplash.com/photo-1534510793699-272ec86a110a","https://images.unsplash.com/photo-1501820488136-72669147e0d4","https://images.unsplash.com/photo-1527380998460-bc37042a4205","https://images.unsplash.com/photo-1596755094514-f87e34083b2c","https://images.unsplash.com/photo-1586671267737-da242503ef9c","https://images.unsplash.com/photo-1574158622682-e40662a9c5c7","https://images.unsplash.com/photo-1601758228041-f3b2795255f1","https://images.unsplash.com/photo-1514917641029-797304561d36","https://images.unsplash.com/photo-1530281700549-e82e7bf110d6","https://images.unsplash.com/photo-1560707859-838634810f44","https://images.unsplash.com/photo-1560807707-8cc77767d783","https://images.unsplash.com/photo-1519052524688-062e74288008","https://images.unsplash.com/photo-1555169062-013468b47731","https://images.unsplash.com/photo-1598133894008-61f7fdb8cc3a","https://images.unsplash.com/photo-1472491235688-bdc81a63246b","https://images.unsplash.com/photo-1535268647677-300dbf3d78d1","https://images.unsplash.com/photo-1581888227599-779811939961","https://images.unsplash.com/photo-1583337130417-3346a1be7dee","https://images.unsplash.com/photo-1536534433052-1673898864ae","https://images.unsplash.com/photo-1549545931-5f212433a0f9","https://images.unsplash.com/photo-1591160690555-5debfba289f0","https://images.unsplash.com/photo-1516483638261-f4dbaf036963","https://images.unsplash.com/photo-1546182990-dffe0b84eb52","https://images.unsplash.com/photo-1552532076-787e34c85675","https://images.unsplash.com/photo-1590412200988-a3bc8822ec5a","https://images.unsplash.com/photo-1588943211346-0908a1fb0b01","https://images.unsplash.com/photo-1589924691995-400dc9ec1144"
        ];

        let myPlayerId = null, currentGridSize = 4, selectedImage = "", pecaSelecionadaId = null;

        document.querySelectorAll('.identity-container button').forEach(b => b.addEventListener('click', (e) => { myPlayerId = e.target.dataset.player; conectarAoJogo(); }));
        document.getElementById('btn-reset-game').addEventListener('click', () => resetarPartidaCompleta(document.getElementById('select-difficulty').value));

        async function resetarPartidaCompleta(diff) {
            let size = diff === "facil" ? 4 : (diff === "medio" ? 5 : 6);
            let ord = Array.from({length: size**2}, (_, i) => i).sort(() => Math.random() - 0.5);
            await set(ref(db, 'partidas/' + NOSSA_SALA_FIXA), { imagem: ListaCemImagens[Math.floor(Math.random()*50)], dificuldade: diff, tamanho_grade: size, turno_atual: "player_1", ordem_pecas: ord, pecas_encaixadas: { "init": true } });
        }

        async function conectarAoJogo() {
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            onValue(ref(db, 'partidas/' + NOSSA_SALA_FIXA), (snap) => {
                const d = snap.val();
                if (!d) return;
                currentGridSize = d.tamanho_grade; selectedImage = d.imagem;
                document.getElementById('display-difficulty').innerText = d.dificuldade.toUpperCase();
                
                const grid = document.getElementById('puzzle-grid');
                grid.innerHTML = ""; grid.style.gridTemplateColumns = `repeat(${currentGridSize}, 1fr)`;
                
                for (let i = 0; i < currentGridSize**2; i++) {
                    const slot = document.createElement('div'); slot.className = 'grid-slot';
                    if (d.pecas_encaixadas && d.pecas_encaixadas[i]) slot.appendChild(criarPeca(i));
                    else slot.addEventListener('click', () => { if (pecaSelecionadaId === i) { 
                        let u = {}; u[`partidas/${NOSSA_SALA_FIXA}/pecas_encaixadas/${i}`] = true; 
                        u[`partidas/${NOSSA_SALA_FIXA}/turno_atual`] = (myPlayerId === "player_1" ? "player_2" : "player_1");
                        update(ref(db), u); pecaSelecionadaId = null;
                    }});
                    grid.appendChild(slot);
                }
                const bank = document.getElementById('pieces-container'); bank.innerHTML = "";
                d.ordem_pecas.forEach(id => {
                    if (!d.pecas_encaixadas || !d.pecas_encaixadas[id]) {
                        const p = document.createElement('div'); p.className = 'puzzle-piece-wrapper';
                        if (pecaSelecionadaId === id) p.classList.add('selecionada');
                        p.appendChild(criarPeca(id));
                        p.addEventListener('click', () => { if(d.turno_atual === myPlayerId) { pecaSelecionadaId = id; conectarAoJogo(); }});
                        bank.appendChild(p);
                    }
                });
                document.getElementById('turn-overlay').classList.toggle('hidden', d.turno_atual === myPlayerId);
            });
        }

        function criarPeca(id) {
            const p = document.createElement('div'); p.className = 'puzzle-piece';
            p.style.backgroundImage = `url(${selectedImage})`;
            p.style.backgroundSize = `${currentGridSize*100}% ${currentGridSize*100}%`;
            p.style.backgroundPosition = `${(id%currentGridSize)/(currentGridSize-1)*100}% ${Math.floor(id/currentGridSize)/(currentGridSize-1)*100}%`;
            return p;
        }
    </script>
</body>
</html>
