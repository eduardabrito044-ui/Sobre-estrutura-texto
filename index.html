<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nosso Pandinha 3D 🐼</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #1a1a24; color: white; padding: 20px; }
        
        /* Efeito Boneco 3D */
        #panda-img { 
            width: 200px; 
            margin: 20px auto; 
            display: block;
            /* Sombra que dá profundidade 3D */
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.5));
            /* Suaviza as bordas */
            transition: transform 0.2s;
        }
        
        /* Animação de pulo ao clicar */
        #panda-img:active { transform: scale(0.95); }

        .stats { font-size: 1.5em; margin: 20px; font-weight: bold; text-shadow: 2px 2px #000; }
        
        button { 
            padding: 15px 25px; width: 80%; cursor: pointer; font-size: 18px; 
            border-radius: 15px; border: none; 
            background: #e67e22; color: white; font-weight: bold;
            /* Sombra 3D no botão */
            box-shadow: 0 5px #d35400;
            transition: all 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 1px #d35400; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Quem está entrando?</h1>
        <button onclick="entrar('Ele')">Entrar como Ele 🧔</button>
        <button onclick="entrar('Ela')">Entrar como Ela 👩‍🦰</button>
    </div>

    <div id="pet-area" class="hidden">
        <h1 id="boas-vindas">Olá!</h1>
        <img id="panda-img" src="1000079336.png" alt="Pandinha">
        <div class="stats">
            Energia: <span id="energia">100</span>% | Amor: <span id="amor">100</span>%
        </div>
        <div class="menu">
            <button onclick="acao('alimentar')">Dar Bambu 🎋</button>
            <button onclick="acao('limpar')">Dar Banho 🚿</button>
            <button onclick="acao('brincar')">Brincar 🎮</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTmhs9bZp-IuBzqwTxQZlrHu9IHsDmJQA",
            authDomain: "dddua-81207.firebaseapp.com",
            databaseURL: "https://dddua-81207-default-rtdb.firebaseio.com",
            projectId: "dddua-81207",
            storageBucket: "dddua-81207.firebasestorage.app",
            messagingSenderId: "844138746278",
            appId: "1:844138746278:web:341f704f22c106473d7f67",
            measurementId: "G-F4SC83V4KB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const petRef = ref(db, 'pandinha_do_casal');

        window.entrar = (nome) => {
            document.getElementById('boas-vindas').innerText = "Olá, " + nome + "!";
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('pet-area').classList.remove('hidden');
        };

        // Lógica corrigida para garantir que os dados atualizam no Firebase
        window.acao = async (tipo) => {
            const snapshot = await get(petRef);
            let dados = snapshot.val() || { energia: 100, amor: 100 };
            
            if(tipo === 'alimentar') dados.energia = Math.min(dados.energia + 10, 100);
            if(tipo === 'limpar') dados.amor = Math.min(dados.amor + 10, 100);
            if(tipo === 'brincar') { 
                dados.energia = Math.max(dados.energia - 5, 0); 
                dados.amor = Math.min(dados.amor + 5, 100); 
            }

            await update(petRef, dados);
        };

        onValue(petRef, (snapshot) => {
            const dados = snapshot.val();
            if(dados) {
                document.getElementById('energia').innerText = dados.energia;
                document.getElementById('amor').innerText = dados.amor;
            }
        });
    </script>
</body>
</html>
