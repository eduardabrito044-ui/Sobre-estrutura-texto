<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Grimoire RPG ⚔️</title>
    <style>
        body { background: #0a0a0c; color: #d4af37; font-family: 'Courier New', monospace; text-align: center; padding: 10px; }
        .card { border: 2px solid #d4af37; padding: 20px; max-width: 400px; margin: 10px auto; background: #16161a; }
        .mission-box { border: 2px solid #d4af37; padding: 15px; margin: 10px 0; background: #222; }
        .sword { font-size: 50px; margin: 20px; text-shadow: 0 0 10px #d4af37; }
        button { background: #d4af37; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login" class="card">
        <h1>Pixel Grimoire</h1>
        <button onclick="iniciar()">Iniciar Aventura</button>
    </div>

    <div id="game" class="card" style="display:none;">
        <div id="current-sword" class="sword">🗡️</div>
        <div id="mission-list"></div>
    </div>

    <script>
        // Lista completa com 50 missões descritivas
        const missoes = [
            "1. Dê um bom dia especial e diga algo que admira nele(a).", "2. Arrumem o quarto juntos hoje.", 
            "3. Envie uma foto de um momento feliz de vocês.", "4. Pergunte sinceramente: 'Como posso te fazer mais feliz hoje?'",
            "5. Lave a louça hoje como um presente.", "6. Escolham uma música que seja 'a música de vocês'.",
            "7. Mande um áudio de voz dizendo o quanto ama.", "8. Prepare um café ou bebida favorita do outro.",
            "9. Faça um elogio sincero sobre a aparência.", "10. Planejem juntos o próximo lanche especial.",
            "11. Esconda um bilhete escrito à mão em algum lugar.", "12. Ajude o parceiro em uma tarefa chata.",
            "13. Assistam a um filme escolhido pelo parceiro.", "14. Dê uma massagem de 10 minutos nos ombros.",
            "15. Relembre como foi o primeiro encontro.", "16. Diga 3 motivos pelos quais escolheu ficar com ele(a).",
            "17. Traga um copo de água sem ninguém pedir.", "18. Elogie o cheiro do perfume do parceiro.",
            "19. Dê atenção total, sem celular, por 30 minutos.", "20. Preparem o ambiente para uma noite calma.",
            "21. Escolham uma foto para revelar e guardar.", "22. Diga algo que ninguém sabe que você admira no outro.",
            "23. Mande um meme que só vocês dois entenderiam.", "24. Faça carinho nos pés ou mãos após o dia cansativo.",
            "25. Tirem uma selfie boba juntos hoje.", "26. Escreva uma mensagem: 'Estou com saudade agora'.",
            "27. Elogie o sorriso do parceiro intensamente.", "28. Faça um cafuné longo enquanto conversam.",
            "29. Leiam um poema ou texto curto um para o outro.", "30. Planejem o próximo passeio de fim de semana.",
            "31. Dê um beijo demorado de boas-vindas.", "32. Elogie o bom gosto dele(a) para se vestir.",
            "33. Dê um abraço apertado de 20 segundos.", "34. Faça um pequeno favor que o parceiro pediu.",
            "35. Olhe nos olhos do outro e segure as mãos.", "36. Diga como se sente seguro(a) ao lado dele(a).",
            "37. Preparem um banho relaxante juntos.", "38. Diga 'você é a pessoa mais linda que conheço'.",
            "39. Dê um beijo carinhoso no rosto.", "40. Sussurre algo que desperte curiosidade.",
            "41. Convide para algo diferente do comum.", "42. Explore um toque novo que o parceiro gosta.",
            "43. Envie uma mensagem provocante.", "44. Prepare o clima no quarto com luz baixa.",
            "45. Elogie algo que ninguém vê.", "46. Beijos apaixonados e demorados.",
            "47. Use palavras que expressem seu desejo.", "48. Foque 100% no prazer do outro.",
            "49. Compartilhe um segredo íntimo.", "50. Realize um desejo especial do seu parceiro."
        ];

        const espadas = ["🗡️", "⚔️", "🛡️", "✨⚔️", "🔥⚔️", "👑🗡️"];
        let index = 0;
        let level = 0;

        function iniciar() {
            document.getElementById('login').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            renderizar();
        }

        function renderizar() {
            const list = document.getElementById('mission-list');
            list.innerHTML = "";
            for(let i = index; i < index + 2 && i < missoes.length; i++) {
                list.innerHTML += `<div class="mission-box"><p>${missoes[i]}</p><button onclick="proximo()">Cumpri!</button></div>`;
            }
        }

        function proximo() {
            index += 2;
            level = Math.min(level + 1, espadas.length - 1);
            document.getElementById('current-sword').innerText = espadas[level];
            renderizar();
        }
    </script>
</body>
</html>
