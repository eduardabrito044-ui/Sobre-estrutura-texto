<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quiz de Casal - Nosso Mundo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a24;
            background-image:
                linear-gradient(45deg, #111 25%, transparent 25%),
                linear-gradient(-45deg, #111 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #111 75%),
                linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            min-height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        #main-container {
            display: grid;
            grid-template-columns: 1.8fr 1.2fr;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
            gap: 10px;
        }

        @media (max-width: 900px) {
            #main-container {
                grid-template-columns: 1fr;
            }
        }

        .painel {
            background-color: rgba(30, 30, 38, 0.95);
            border: 4px solid #3a3a4a;
            border-radius: 12px;
            box-shadow: 0px 6px 0px #111;
            padding: 12px;
            box-sizing: border-box;
        }

        .titulo-painel {
            font-size: 0.85em;
            margin: -12px -12px 10px -12px;
            background-color: #3a3a4a;
            padding: 6px 12px;
            border-radius: 8px 8px 0 0;
            color: #ffd700;
            font-weight: bold;
        }

        /* PAINEL DO JOGO */
        #header-quiz {
            text-align: center;
            margin-bottom: 10px;
        }

        #titulo-principal { font-size: 1.5em; margin: 0; text-shadow: 2px 2px 0 #000; }
        #sub-titulo { font-size: 0.9em; margin: 3px 0; color: #ccc; }

        #quadro-jogo {
            background-color: #387a56;
            border: 8px solid #5c3e32;
            border-radius: 14px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            min-height: 340px;
            box-sizing: border-box;
        }

        #caixa-pergunta {
            background-color: white;
            color: black;
            padding: 12px;
            border-radius: 8px;
            border: 3px solid #5c3e32;
            text-align: center;
            font-weight: bold;
            font-size: 0.95em;
            width: 95%;
            margin-bottom: 8px;
            transition: background-color 0.3s, color 0.3s;
        }

        #cronometro { font-size: 1.1em; font-weight: bold; margin-bottom: 8px; text-shadow: 1px 1px 0 #000; }

        /* SISTEMA ANTI-ROUBO: TELAS INDIVIDUAIS */
        #zona-respostas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            z-index: 2;
        }

        @media (max-width: 600px) {
            #zona-respostas { grid-template-columns: 1fr; gap: 10px; }
        }

        .pnl-resposta {
            background-color: #fce4ec;
            border-radius: 10px;
            border: 3px solid #5c3e32;
            padding: 8px;
            color: black;
            position: relative;
            min-height: 180px;
        }

        .tela-privacidade {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #222;
            color: #ff6b81;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            z-index: 10;
            padding: 10px;
            box-sizing: border-box;
        }

        .lista-opcoes { display: flex; flex-direction: column; gap: 6px; margin-top: 15px; }

        .btn-opcao {
            background-color: white;
            color: black;
            border: 2px solid #ccc;
            border-radius: 15px;
            padding: 6px 12px;
            text-align: left;
            font-size: 0.85em;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-opcao.selecionado {
            border-color: #ffd700 !important;
            background-color: #fffde6;
            box-shadow: 0 0 5px #ffd700;
        }

        /* ABAS INTERATIVAS PARA CELULAR */
        .abas-container { display: flex; gap: 5px; margin-bottom: 8px; }
        .aba-btn {
            background-color: #2a2a35;
            color: white;
            border: 2px solid #4a4a5a;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75em;
            font-family: inherit;
            flex: 1;
            text-align: center;
        }
        .aba-btn.ativa { background-color: #d81b60; border-color: #ff6b81; }
        .conteudo-aba { display: none; }
        .conteudo-aba.ativa { display: block; }

        /* CORES DE STATUS */
        .acerto { background-color: #27ae60 !important; color: white !important; }
        .erro { background-color: #c0392b !important; color: white !important; }

        /* MENU DE TEMAS */
        .menu-temas { display: flex; flex-direction: column; gap: 6px; }
        .btn-tema {
            background: linear-gradient(to bottom, #d81b60, #ad1457);
            color: white; border: 3px solid #3a3a4a; border-radius: 8px;
            padding: 10px; text-align: left; font-weight: bold; font-size: 0.85em;
            cursor: pointer; box-shadow: 0px 4px 0px #111; font-family: inherit;
        }
        .btn-tema:active { box-shadow: 0px 1px 0px #111; transform: translateY(3px); }

        /* CONTROLES INFERIORES */
        #controles-inferiores {
            display: flex; justify-content: space-around; align-items: center;
            padding: 12px; background-color: #2a2a35; border-top: 4px solid #3a3a4a;
            margin-top: 15px; border-radius: 12px;
        }
        @media (max-width: 600px) { #controles-inferiores { flex-direction: column; gap: 15px; } }

        .dpad-cruz { display: grid; grid-template-columns: repeat(3, 35px); grid-template-rows: repeat(3, 35px); gap: 3px; }
        .btn-seta { background-color: #5c3e32; color: white; border: 2px solid #111; font-size: 1em; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .seta-cima { grid-column: 2; grid-row: 1; } .seta-esq { grid-column: 1; grid-row: 2; } .seta-baixo { grid-column: 2; grid-row: 3; } .seta-dir { grid-column: 3; grid-row: 2; }

        .btn-comando { width: 90px; height: 90px; border-radius: 50%; color: white; border: 4px solid #111; font-size: 0.75em; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #111; font-family: inherit; }
        #btn-confirmar { background-color: #2980b9; } #btn-pista { background-color: #27ae60; }
        .btn-comando:active { transform: translateY(3px); box-shadow: 0 2px 0 #111; }
    </style>
</head>
<body>

    <div id="main-container">
        <div>
            <div id="header-quiz">
                <h1 id="titulo-principal">QUIZ DE CASAL</h1>
                <div id="sub-titulo">NOS: <span id="pts-nos" style="color: #ffd700;">78 PTS</span> | <span id="vlr-bonus" style="color: #ff6b81;">12 PB</span></div>
            </div>
            
            <div id="quadro-jogo">
                <div id="caixa-pergunta">CARREGANDO...</div>
                <div id="cronometro">TEMPO: <span id="tempo">15S</span></div>
                
                <div id="zona-respostas">
                    <div class="pnl-resposta" id="pnl-ela">
                        <div style="font-weight: bold; margin-bottom: 5px;">👑 ELA:</div>
                        <div class="tela-privacidade" id="privacidade-ela" style="display:none;">VEJA PARA O LADO!<br>TURNO DO ELE</div>
                        <div class="lista-opcoes" id="opcoes-ela"></div>
                    </div>
                    
                    <div class="pnl-resposta" id="pnl-ele">
                        <div style="font-weight: bold; margin-bottom: 5px;">🧔 ELE:</div>
                        <div class="tela-privacidade" id="privacidade-ele">AGUARDE...<br>TURNO DA ELA</div>
                        <div class="lista-opcoes" id="opcoes-ele"></div>
                    </div>
                </div>
            </div>
        </div>

        <div>
            <div class="abas-container">
                <button class="aba-btn ativa" onclick="mudarAba('aba-temas')">TEMAS</button>
                <button class="aba-btn" onclick="mudarAba('aba-status')">STATUS</button>
            </div>

            <div id="aba-temas" class="conteudo-aba ativa">
                <div class="painel">
                    <div class="titulo-painel">SELECIONE O TEMA</div>
                    <div class="menu-temas">
                        <button class="btn-tema" onclick="mudarTema(1)">1. ROMANCE 💖</button>
                        <button class="btn-tema" onclick="mudarTema(2)">2. DIVERSAO 🎭</button>
                        <button class="btn-tema" onclick="mudarTema(3)">3. MEMORIA 🧠</button>
                        <button class="btn-tema" onclick="mudarTema(4)">4. FUTURO ✈️</button>
                        <button class="btn-tema" onclick="mudarTema(5)">5. ESPECIAIS ✨</button>
                        <button class="btn-tema" onclick="mudarTema(6)" style="background: linear-gradient(to bottom, #2980b9, #1f4e79);">6. TEMA "ELE" 🧔</button>
                        <button class="btn-tema" onclick="mudarTema('aleatorio')" style="background: linear-gradient(to bottom, #8e44ad, #6c3483);">🎲 TEMA ALEATORIO</button>
                    </div>
                </div>
            </div>

            <div id="aba-status" class="conteudo-aba">
                <div class="painel">
                    <div class="titulo-painel">LEADERBOARD</div>
                    <div style="font-size: 0.85em; line-height: 1.6;">
                        CASAL 1: <span style="color:#ffd700">125 PTS</span><br>
                        CASAL 2: <span style="color:#ffd700">98 PTS</span><br>
                        VOCES: <span id="status-nos-pts" style="color:#2ecc71">78 PTS</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="controles-inferiores">
        <div id="zona-dpad">
            <div class="dpad-cruz">
                <button class="btn-seta seta-cima">↑</button>
                <button class="btn-seta seta-esq">←</button>
                <button class="btn-seta seta-baixo">↓</button>
                <button class="btn-seta seta-dir">→</button>
            </div>
        </div>
        <div style="display: flex; gap: 15px;">
            <button class="btn-comando" id="btn-confirmar">AVANCAR TURNO</button>
            <button class="btn-comando" id="btn-pista">USAR PISTA</button>
        </div>
    </div>

    <script>

                { p: "Como vai ser o casamento dos sonhos?", r: "B", o: ["Festa gigante com muita gente 🎪", "Cerimônia íntima só para família 🌸", "Casar na praia ou campo 🏖️", "Apenas assinar o papel e viajar ✈️"] },
                { p: "Quem vai acordar mais cedo na rotina do futuro?", r: "B", o: ["Ela 👸", "Ele 🧔", "Nenhum, os dois gostam de dormir 😴", "A rotina do trabalho vai obrigar ⏰"] },

                { p: "Se pudessem escolher um superpoder para o futuro, qual seria?", r: "A", o: ["Teletransporte para viajar de graça ⚡", "Ler a mente do parceiro 🧠", "Prever o futuro financeiro 🔮", "Tempo infinito para dormir ⏳"] },
                { p: "Qual hábito atual vocês querem levar para sempre?", r: "D", o: ["Assistir séries juntinhos no frio 🍿", "Conversar sobre o dia antes de dormir 💬", "Fazer planos mirabolantes 🗺️", "Todas as alternativas anteriores! 🥰"] },
                { p: "Quem é mais focado em estudar para garantir o futuro?", r: "A", o: ["Ela 👸", "Ele 🧔", "Os dois se cobram muito 📚", "Levamos de forma mais leve 🕊️"] }
            ],
            5: [ // ESPECIAIS
                { p: "Qual a maior virtude do relacionamento de vocês?", r: "D", o: ["A confiança total 🤝", "O carinho diário 🥰", "A parceria para qualquer hora 🚀", "A amizade e as risadas bobas 😂"] },
                { p: "O que o parceiro faz que te deixa bobo(a) de amor?", r: "C", o: ["O sorriso sincero 😁", "O jeito de olhar fixo 👀", "O abraço protetor de surpresa 🤗", "Quando cuida de mim doente 💊"] },
                { p: "Qual o maior aprendizado que tiveram juntos?", r: "B", o: ["Ter mais paciência 😌", "Ouvir e conversar mais 💬", "Demonstrar sentimentos sem medo 💖", "Dividir as coisas igualmente 🤝"] },
                { p: "Se o relacionamento fosse um filme, qual gênero seria?", r: "C", o: ["Comédia romântica clichê 🍿", "Aventura cheia de adrenalina 🎢", "Fantasia mágica ✨", "Um documentário engraçado 📽️"] },
                { p: "Qual o nível de conexão do casal em silêncio?", r: "A", o: ["Nos entendemos só pelo olhar! 👀", "Fica um silêncio confortável ☕", "Dá agonia, temos que falar algo 💬", "Depende do dia e do humor 🌤️"] },
                { p: "Qual o cheiro que mais lembra o parceiro?", r: "B", o: ["O perfume oficial dele(a) 🧴", "Cheiro de roupa limpa 👕", "Cheiro de abraço quentinho 🤗", "Cheiro de comida boa 🍕"] },
                { p: "O que vocês mais sentem falta quando estão longe?", r: "D", o: ["Das conversas bestas 💬", "Do carinho físico 💖", "Da presença do outro no ambiente 🏢", "De tudo junto ao mesmo tempo! 🌍"] },
                { p: "O que faz vocês resolverem qualquer briga?", r: "A", o: ["Uma conversa sincera na hora 💬", "Um abraço forte em silêncio 🤗", "Pedir desculpas com comida 🍕", "Esperar o sangue esfriar sozinhos ⏳"] },
                { p: "Qual a melhor parte de namorar o outro?", r: "D", o: ["Ter alguém para desabafar tudo 🗣️", "Se sentir seguro e amado(a) 🛡️", "Ter uma companhia para qualquer rolê 🏃‍♂️", "Poder ser eu mesmo(a) sem julgamentos 🎭"] },
                { p: "O que define o apoio que dão um ao outro?", r: "A", o: ["Incondicional, apoiamos qualquer sonho! 🚀", "Pés no chão, ajudamos a avaliar tudo 🗺️", "Silencioso, mas sempre presente 🤫", "Cobramos o crescimento mútuo 📈"] },
                { p: "Qual detalhe físico você mais repara no outro?", r: "B", o: ["Os olhos 👁️", "O sorriso/Boca 👄", "O cabelo 💇‍♂️", "As mãos/Abraço 🤝"] },
                { p: "Qual música secreta faz vocês lembrarem um do outro?", r: "C", o: ["Um funk animado 💃", "Um pop acústico calmo 🎸", "Aquela música brega que cantamos rindo 🎤", "Não temos músicas secretas ❌"] },
                { p: "O que mais acalma o parceiro em um dia estressante?", r: "A", o: ["Ficar quietinho recebendo cafuné 💆‍♂️", "Desabafar falando sem parar 🗣️", "Comer o lanche favorito 🍔", "Dormir por algumas horas 💤"] },
                { p: "Qual brincadeira interna só vocês dois entendem?", r: "C", o: ["Uma piada com alguma palavra 🔤", "Um som ou careta esquisita 😜", "Um meme interno muito antigo 🎞️", "Não temos brincadeiras internas 🤷‍♂️"] },
                { p: "Qual o maior sonho em comum no momento?", r: "A", o: ["Fazer a nossa primeira grande viagem ✈️", "Terminar os estudos bem colocados 🎓", "Comprar algo importante juntos 🔑", "Ficar mais tempo juntos na semana ⏰"] },
                { p: "Se pudessem congelar o tempo em um momento, qual seria?", r: "B", o: ["No meio de uma crise de riso juntos 😂", "Em um abraço bem calmo no frio ❄️", "No instante do reencontro após dias longe ⏰", "Em um rolê inesquecível de férias 🏖️"] }
            ],
            6: [ // TEMA DELE
                { p: "Qual o prato ou lanche favorito do Ele?", r: "A", o: ["Lasanha 🍝", "Pizza de calabresa 🍕", "Hambúrguer artesanal 🍔", "Churrasco com os amigos 🥩"] },
                { p: "Qual o maior hobby ou passatempo do Ele?", r: "C", o: ["Assistir jogos de futebol ⚽", "Academia e treinos 🏋️‍♂️", "Jogar videogame/PC 🎮", "Ver vídeos no YouTube/Kwai 📱"] },
                { p: "Qual o estilo de roupa que o Ele mais gosta de usar?", r: "B", o: ["Social e camisa polo 👕", "Camiseta casual e bermuda 🩳", "Estilo esportivo/Moletom 👟", "O que estiver limpo no armário 🤷‍♂️"] },
                { p: "O que mais irrita o Ele facilmente?", r: "A", o: ["Fome extrema 😡🍔", "Internet caindo ou travando 🌐", "Demora excessiva para sair ⏰", "Gente fazendo drama desnecessário 🎭"] },
                { p: "Qual o maior sonho de consumo material do Ele?", r: "D", o: ["Um celular topo de linha 📱", "Um computador gamer potente 🖥️", "Uma moto esportiva 🏍️", "O carro dos sonhos modificado 🏎️"] },
                { p: "Como o Ele reage quando está triste ou estressado?", r: "C", o: ["Fica reclamando e falando bastante 🗣️", "Quer carinho e atenção imediata 🥺", "Fica mais quieto no canto dele 🤫", "Tenta se distrair jogando/Assistindo 🎮"] },
                { p: "Qual o super-herói ou personagem de filme favorito do Ele?", r: "A", o: ["Batman ou herói sombrio 🦇", "Homem-Aranha ou herói carismático 🕷️", "Personagem de ação de carros (Brian/Toretto) 🏎️", "Não liga para heróis ❌"] },
                { p: "Se o Ele pudesse comer apenas uma coisa para o resto da vida, seria:", r: "B", o: ["Arroz, feijão e carne frita 🥩", "Pizza de qualquer sabor 🍕", "Hambúrguer com muita batata 🍟", "Açaí lotado de acompanhamentos 🍧"] },
                { p: "Qual o maior talento oculto ou habilidade do Ele?", r: "A", o: ["Manjar muito de tecnologia/Jogos 💻", "Cozinhar lanches ótimos 🍳", "Saber piadas na hora certa 😂", "Ter facilidade com cálculos/Lógica 🧠"] },
                { p: "Quem é o Ele na hora de acordar de manhã?", r: "B", o: ["Acorda elétrico e disposto ☀️", "Coloca 10 despertadores e acorda bravo ⏰", "Levanta arrastando os pés e toma café ☕", "Dorme direto se ninguém chamar 😴"] },
                { p: "Qual estilo de música domina a playlist do Ele?", r: "D", o: ["Sertanejo ou pisadinha animada 🤠", "Rock ou metal pesado 🎸", "Rap/Trap nacional 🎤", "Músicas de jogos ou eletrônica 🎧"] },
                { p: "Qual o maior medo secreto ou receio do Ele?", r: "B", o: ["Insetos voadores/Barata 🪳", "Fracassar nos planos de futuro 📉", "Ficar sem bateria na rua 🪫", "Lugares muito altos/Alturas 🏔️"] },
                { p: "O que o Ele acha que faz melhor do que a Ela?", r: "C", o: ["Ter paciência em discussões 😌", "Escolher filmes bons para assistir 🎬", "Jogar qualquer tipo de jogo 🎮", "Economizar dinheiro nas saídas 🪙"] },
                { p: "Qual o time de futebol do coração do Ele?", r: "A", o: ["Acompanha e torce muito ⚽", "Só torce em jogos grandes 🏆", "Não liga para futebol de jeito nenhum 🚫", "Prefere outros esportes 🏎️"] },
                { p: "O que o Ele mais repara em uma menina de início?", r: "B", o: ["O estilo de se vestir 👗", "O olhar e o sorriso 😁", "O jeito de falar e a simpatia 💬", "O cabelo 💇‍♀️"] },
                { p: "Qual a mania mais engraçada ou esquisita do Ele?", r: "A", o: ["Ficar mexendo no cabelo toda hora 💇‍♂️", "Ficar balançando a perna quando senta 🦵", "Falar sozinho jogando 🎮", "Fazer piada em momentos sérios 🤡"] }
            ]
        };

        let categoriaAtual = 1;
        let perguntaIndice = 0;
        let tempoRestante = 15;
        let timerInterval;
        let pontosNos = 78;
        let pontosBonus = 12;
        let turnoJogador = "ela"; // ela -> ele -> confirmacao

        let escolhaEla = null;
        let escolhaEle = null;

        const elCaixaPergunta = document.getElementById("caixa-pergunta");
        const elTempo = document.getElementById("tempo");
        const elOpcoesEla = document.getElementById("opcoes-ela");
        const elOpcoesEle = document.getElementById("opcoes-ele");
        const elPontosNos = document.getElementById("pts-nos");
        const elStatusNos = document.getElementById("status-nos-pts");
        const elPontosBonus = document.getElementById("vlr-bonus");
        const elBtnConfirmar = document.getElementById("btn-confirmar");

        function renderizarPergunta() {
            let catID = categoriaAtual;
            if (categoriaAtual === "aleatorio") {
                catID = Math.floor(Math.random() * 6) + 1;
            }

            const pool = bancoPerguntas[catID];
            // Garante que o índice não estoure o banco de dados
            if (perguntaIndice >= pool.length) perguntaIndice = 0;
            
            const dados = pool[perguntaIndice];
            elCaixaPergunta.textContent = dados.p.toUpperCase();
            elCaixaPergunta.className = ""; 

            elOpcoesEla.innerHTML = "";
            elOpcoesEle.innerHTML = "";
            const alternativas = ["A", "B", "C", "D"];

            for (let i = 0; i < 4; i++) {
                const btnEla = document.createElement("button");
                btnEla.className = "btn-opcao";
                btnEla.id = `opt-ela-${alternativas[i]}`;
                btnEla.textContent = `${alternativas[i]}) ${dados.o[i]}`;
                btnEla.onclick = () => selecionar('ela', alternativas[i]);
                elOpcoesEla.appendChild(btnEla);

                const btnEle = document.createElement("button");
                btnEle.className = "btn-opcao";
                btnEle.id = `opt-ele-${alternativas[i]}`;
                btnEle.textContent = `${alternativas[i]}) ${dados.o[i]}`;
                btnEle.onclick = () => selecionar('ele', alternativas[i]);
                elOpcoesEle.appendChild(btnEle);
            }

            configurarTurno("ela");
            resetTimer();
        }

        function selecionar(jogador, alt) {
            if (jogador !== turnoJogador) return; // Impede responder fora do turno

            if (jogador === 'ela') {
                if (escolhaEla) document.getElementById(`opt-ela-${escolhaEla}`).classList.remove("selecionado");
                escolhaEla = alt;
            } else {
                if (escolhaEle) document.getElementById(`opt-ele-${escolhaEle}`).classList.remove("selecionado");
                escolhaEle = alt;
            }
            document.getElementById(`opt-${jogador}-${alt}`).classList.add("selecionado");
        }

        function configurarTurno(turno) {
            turnoJogador = turno;
            if (turno === "ela") {
                document.getElementById("privacidade-ela").style.display = "none";
                document.getElementById("privacidade-ele").style.display = "flex";
                elBtnConfirmar.textContent = "PRONTINHO (PROX. TURNO)";
                elBtnConfirmar.style.background = "#2980b9";
            } else if (turno === "ele") {
                document.getElementById("privacidade-ela").style.display = "flex";
                document.getElementById("privacidade-ele").style.display = "none";
                elBtnConfirmar.textContent = "REVELAR RESPOSTAS 🚨";
                elBtnConfirmar.style.background = "#e67e22";
            }
        }

        elBtnConfirmar.onclick = function() {
            if (turnoJogador === "ela") {
                if (!escolhaEla) { alert("ELA PRECISA RESPONDER!"); return; }
                configurarTurno("ele");
            } else if (turnoJogador === "ele") {
                if (!escolhaEle) { alert("ELE PRECISA RESPONDER!"); return; }
                validarAfinidade();
            }
        };

        function validarAfinidade() {
            clearInterval(timerInterval);
            document.getElementById("privacidade-ela").style.display = "none";
            document.getElementById("privacidade-ele").style.display = "none";

            // Se baterem as respostas (Afinidade!)
            if (escolhaEla === escolhaEle) {
                pontosNos += 10;
                pontosBonus += 2;
                elCaixaPergunta.textContent = "SINTONIA PERFEITA! VOCES COINCIDIRAM! ✨";
                elCaixaPergunta.className = "acerto";
                document.getElementById(`opt-ela-${escolhaEla}`).className = "btn-opcao acerto";
                document.getElementById(`opt-ele-${escolhaEle}`).className = "btn-opcao acerto";
            } else {
                elCaixaPergunta.textContent = "DIVIRGIRAM! CADA UM PENSOO DE UM JEITO 💔";
                elCaixaPergunta.className = "erro";
                document.getElementById(`opt-ela-${escolhaEla}`).className = "btn-opcao erro";
                document.getElementById(`opt-ele-${escolhaEle}`).className = "btn-opcao erro";
            }

            elPontosNos.textContent = `${pontosNos} PTS`;
            elStatusNos.textContent = `${pontosNos} PTS`;
            elPontosBonus.textContent = `${pontosBonus} PB`;

            turnoJogador = "travado";
            setTimeout(() => {
                escolhaEla = null;
                escolhaEle = null;
                perguntaIndice++;
                renderizarPergunta();
            }, 3000);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            tempoRestante = 15;
            elTempo.textContent = `${tempoRestante}S`;
            timerInterval = setInterval(() => {
                tempoRestante--;
                elTempo.textContent = `${tempoRestante}S`;
                if (tempoRestante <= 0) {
                    clearInterval(timerInterval);
                    if (!escolhaEla) escolhaEla = "N/A";
                    if (!escolhaEle) escolhaEle = "N/A";
                    validarAfinidade();
                }
            }, 1000);
        }

        function mudarTema(tema) {
            categoriaAtual = tema;
            perguntaIndice = 0;
            escolhaEla = null;
            escolhaEle = null;
            renderizarPergunta();
        }

        function mudarAba(abaId) {
            document.querySelectorAll('.conteudo-aba').forEach(el => el.classList.remove('ativa'));
            document.querySelectorAll('.aba-btn').forEach(el => el.classList.remove('ativa'));
            document.getElementById(abaId).classList.add('ativa');
            event.currentTarget.classList.add('ativa');
        }

        // SISTEMA DE PISTA (Elimina duas erradas)
        document.getElementById("btn-pista").onclick = function() {
            let catID = categoriaAtual === "aleatorio" ? 1 : categoriaAtual;
            const dados = bancoPerguntas[catID][perguntaIndice];
            const erradas = ["A", "B", "C", "D"].filter(a => a !== dados.r);
            const sorteadas = erradas.sort(() => 0.5 - Math.random()).slice(0, 2);

            sorteadas.forEach(alt => {
                const opt = document.getElementById(`opt-${turnoJogador}-${alt}`);
                if (opt) {
                    opt.style.opacity = "0.3";
                    opt.style.pointerEvents = "none";
                }
            });
        };

        // Inicializar o jogo
        renderizarPergunta();
    </script>
</body>
</html>
