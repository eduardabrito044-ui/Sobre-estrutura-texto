<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quiz de Casal - Nosso Mundo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a24;
            background-image:
                linear-gradient(45deg, #111 25%, transparent 25%),
                linear-gradient(-45deg, #111 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #111 75%),
                linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            min-height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        #tela-perfil {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .caixa-perfil {
            background-color: rgba(30, 30, 38, 0.95);
            border: 4px solid #3a3a4a;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0px 6px 0px #111;
        }

        .btn-perfil {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid #3a3a4a;
            border-radius: 8px;
            font-size: 1.1em;
            color: white;
        }
        #btn-ela { background: #d81b60; }
        #btn-ele { background: #2980b9; }

        #main-container {
            display: none;
            max-width: 500px;
            margin: 0 auto;
            padding: 10px;
            gap: 10px;
        }

        .painel {
            background-color: rgba(30, 30, 38, 0.95);
            border: 4px solid #3a3a4a;
            border-radius: 12px;
            box-shadow: 0px 6px 0px #111;
            padding: 12px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .titulo-painel {
            font-size: 0.85em;
            margin: -12px -12px 10px -12px;
            background-color: #3a3a4a;
            padding: 6px 12px;
            border-radius: 8px 8px 0 0;
            color: #ffd700;
            font-weight: bold;
            text-align: center;
        }

        #header-quiz {
            text-align: center;
            margin-bottom: 10px;
        }

        #titulo-principal { font-size: 1.3em; margin: 0; text-shadow: 2px 2px 0 #000; text-align: center;}
        #sub-titulo { font-size: 0.85em; margin: 3px 0; color: #ccc; text-align: center; }

        #quadro-jogo {
            background-color: #387a56;
            border: 8px solid #5c3e32;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            box-sizing: border-box;
            margin-bottom: 10px;
            position: relative;
        }

        #caixa-pergunta {
            background-color: white;
            color: black;
            padding: 12px;
            border-radius: 8px;
            border: 3px solid #5c3e32;
            text-align: center;
            font-weight: bold;
            font-size: 0.85em;
            width: 100%;
            margin-bottom: 8px;
            word-wrap: break-word;
            box-sizing: border-box;
        }

        #cronometro { font-size: 1em; font-weight: bold; margin-bottom: 10px; text-shadow: 1px 1px 0 #000; }

        #zona-respostas {
            display: flex;
            flex-direction: column;
            width: 100%;
            box-sizing: border-box;
            position: relative;
        }

        .pnl-resposta {
            background-color: #fce4ec;
            border-radius: 10px;
            border: 3px solid #5c3e32;
            padding: 8px;
            color: black;
            width: 100%;
            box-sizing: border-box;
        }

        .lista-opcoes { display: flex; flex-direction: column; gap: 5px; }

        .btn-opcao {
            background-color: white;
            color: black;
            border: 2px solid #ccc;
            border-radius: 10px;
            padding: 8px;
            text-align: left;
            font-size: 0.75em;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-opcao.selecionado {
            border-color: #d81b60 !important;
            background-color: #fffde6;
            box-shadow: 0 0 5px #d81b60;
            font-weight: bold;
        }

        .controles-quiz-container {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 12px;
        }

        .btn-acao-quiz {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 3px solid #5c3e32;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.85em;
            cursor: pointer;
            color: white;
            text-shadow: 1px 1px 0px #000;
            box-shadow: 0 4px 0px #111;
        }

        #quiz-confirmar { background-color: #2980b9; display: none; }
        #quiz-pista { background-color: #27ae60; }
        .btn-acao-quiz:active { transform: translateY(2px); box-shadow: 0 2px 0px #111; }

        .grid-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .card-status { background-color: #252530; border: 2px solid #3a3a4a; border-radius: 8px; padding: 8px; text-align: center; font-size: 0.75em; }
        .bar-pb { background: linear-gradient(to right, #ffd700, #ffa500); color: black; font-weight: bold; padding: 8px; border-radius: 6px; text-align: center; margin-top: 5px; font-size: 0.85em; }

        .abas-container { display: flex; gap: 5px; margin-bottom: 5px; }
        .aba-btn { background-color: #2a2a35; color: white; border: 2px solid #4a4a5a; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.75em; font-family: inherit; flex: 1; text-align: center; }
        .aba-btn.ativa { background-color: #d81b60; border-color: #ff6b81; }
        .conteudo-aba { display: none; }
        .conteudo-aba.ativa { display: block; }
        .menu-temas { display: flex; flex-direction: column; gap: 5px; }
        .btn-tema { background: linear-gradient(to bottom, #d81b60, #ad1457); color: white; border: 3px solid #3a3a4a; border-radius: 8px; padding: 8px; text-align: left; font-weight: bold; font-size: 0.8em; cursor: pointer; box-shadow: 0px 4px 0px #111; font-family: inherit; }

        .acerto { background-color: #27ae60 !important; color: white !important; }
        .erro { background-color: #c0392b !important; color: white !important; }
        
        #alerta-status {
            margin-top: 8px;
            font-size: 0.75em;
            text-align: center;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 1px 1px 0px #000;
        }
    </style>
</head>
<body>

    <!-- SELEÇÃO DE QUEM É QUEM -->
    <div id="tela-perfil">
        <div class="caixa-perfil">
            <h2 style="color: #ffd700; font-size: 1.2em;">QUEM ESTÁ JOGANDO AGORA?</h2>
            <button id="btn-ela" class="btn-perfil" onclick="definirJogador('ela')">EU SOU A ELA 👩‍🦰</button>
            <button id="btn-ele" class="btn-perfil" onclick="definirJogador('ele')">EU SOU O ELE 🧔</button>
        </div>
    </div>

    <!-- TELA PRINCIPAL DO JOGO -->
    <div id="main-container">
        <div id="header-quiz">
            <h1 id="titulo-principal">QUIZ DE CASAL - NOSSO MUNDO</h1>
            <div id="sub-titulo">JOGADOR ATUAL: <span id="lbl-jogador-atual" style="color: #ffd700;">---</span></div>
        </div>
        
        <div id="quadro-jogo">
            <div id="caixa-pergunta">CARREGANDO...</div>
            <div id="cronometro">TEMPO RESTANTE: <span id="tempo">15S</span></div>
            
            <div id="zona-respostas">
                <div class="pnl-resposta">
                    <div class="lista-opcoes" id="opcoes-jogador"></div>
                </div>
            </div>

            <div id="alerta-status">CONECTANDO AO BANCO...</div>

            <div class="controles-quiz-container">
                <button class="btn-acao-quiz" id="quiz-confirmar" onclick="avancarRodadaOnline()">PRÓXIMA PERGUNTA</button>
                <button class="btn-acao-quiz" id="quiz-pista" onclick="usarPistaDoQuiz()">USAR PISTA</button>
            </div>
        </div>

        <div class="painel">
            <div class="titulo-painel">CATEGORIA: ATUAL</div>
            <div class="grid-cards">
                <div class="card-status">💖 ROMANCE<br>⭐ X0</div>
                <div class="card-status">🎭 DIVERSÃO<br>⭐ X0</div>
                <div class="card-status">🧠 MEMÓRIA<br>⭐ X0</div>
                <div class="card-status">✈️ FUTURO<br>⭐ X0</div>
            </div>
            <div class="bar-pb">💖 <span id="vlr-bonus">12</span> PB 💖</div>
        </div>

        <div class="abas-container">
            <button class="aba-btn ativa" onclick="mudarAba('aba-temas')">TEMAS</button>
            <button class="aba-btn" onclick="mudarAba('aba-status')">STATUS / PLACAR</button>
        </div>

        <div id="aba-temas" class="conteudo-aba ativa">
            <div class="painel">
                <div class="menu-temas">
                    <button class="btn-tema" onclick="mudarTemaOnline(1)">1. ROMANCE 💖</button>
                    <button class="btn-tema" onclick="mudarTemaOnline(2)">2. DIVERSAO 🎭</button>
                    <button class="btn-tema" onclick="mudarTemaOnline(3)">3. MEMORIA 🧠</button>
                    <button class="btn-tema" onclick="mudarTemaOnline(4)">4. FUTURO ✈️</button>
                    <button class="btn-tema" onclick="mudarTemaOnline(5)">5. ESPECIAIS ✨</button>
                    <button class="btn-tema" onclick="mudarTemaOnline(6)" style="background: linear-gradient(to bottom, #2980b9, #1f4e79);">6. TEMA "ELE" 🧔</button>
                </div>
            </div>
        </div>

        <div id="aba-status" class="conteudo-aba">
            <div class="painel">
                <div style="font-size: 0.8em; line-height: 1.6; text-align: center;">
                    CASAL 1: <span style="color:#ffd700">125 PTS</span><br>
                    CASAL 2: <span style="color:#ffd700">98 PTS</span><br>
                    NOSSO PLACAR: <span id="pts-nos" style="color:#2ecc71">78 PTS</span>
                </div>
            </div>
        </div>
    </div>

    <!-- INSERIR SCRIPTS DO FIREBASE AQUI -->
    <!-- Mantenha as tags de script <script src=".../firebase-app.js"> que você já usa no seu projeto original aqui -->

    <script>
        // Mantenha a sua configuração original do Firebase aqui:
        // const firebaseConfig = { ... };
        // firebase.initializeApp(firebaseConfig);
        // const database = firebase.database();

        const bancoPerguntas = {
            1: [
                { p: "Qual o melhor lugar para um encontro perfeito?", r: "A", o: ["Jantar à luz de velas 🕯️", "Piquenique no parque 🌳", "Ir ao cinema 🎬", "Ficar em casa vendo série 🍿"] },
                { p: "Quem demonstrou interesse primeiro?", r: "B", o: ["Ela 👸", "Ele 🧔", "Os dois juntos ⚡", "Foi por mensagem 📱"] },
                { p: "Qual o apelido carinhoso mais usado?", r: "A", o: ["Amor/Mô ❤️", "Bê/Baby 👶", "Vida 🌍", "Apelido secreto 🤫"] }
            ],
            2: [
                { p: "Qual filme vocês mais assistiram juntos?", r: "B", o: ["Vingadores 🎬", "Star Wars 🚀", "Harry Potter ✨", "Shrek 💚"] }
            ],
            3: [
                { p: "Qual a data exata do aniversário de namoro?", r: "A", o: ["Lembramos o dia exato 📅", "Sabemos o mês aproximado 🍂", "Confundimos o ano 🗓️", "Sempre olhar no celular 📱"] }
            ],
            4: [
                { p: "Onde gostariam de morar no futuro?", r: "C", o: ["Apartamento 🏢", "Casa Bairro Calmo 🏡", "Perto da natureza 🍃", "Fora do país ✈️"] }
            ],
            5: [
                { p: "Qual a maior virtude do relacionamento?", r: "D", o: ["Confiança total 🤝", "Carinho diário 🥰", "Parceria total 🚀", "Risadas bobas 😂"] }
            ],
            6: [
                { p: "Qual o prato ou lanche favorito do Ele?", r: "A", o: ["Lasanha 🍝", "Pizza 🍕", "Hambúrguer 🍔", "Churrasco 🥩"] }
            ]
        };

        let meuPerfil = ""; 
        let categoriaAtual = 1;
        let perguntaIndice = 0;
        let tempoRestante = 15;
        let timerInterval;
        let votadoNestaRodada = false;

        const elCaixaPergunta = document.getElementById("caixa-pergunta");
        const elTempo = document.getElementById("tempo");
        const elOpcoesJogador = document.getElementById("opcoes-jogador");
        const elAlertaStatus = document.getElementById("alerta-status");
        const elBtnConfirmar = document.getElementById("quiz-confirmar");

        function definirJogador(perfil) {
            meuPerfil = perfil;
            document.getElementById("lbl-jogador-atual").textContent = perfil.toUpperCase();
            document.getElementById("tela-perfil").style.display = "none";
            document.getElementById("main-container").style.display = "block";
            
            // Inicia escuta em tempo real da sala no Firebase
            database.ref("sala_quiz").on("value", (snapshot) => {
                const dados = snapshot.val();
                if (dados) {
                    processarDadosFirebase(dados);
                } else {
                    // Inicialização padrão caso o banco esteja limpo
                    database.ref("sala_quiz").set({
                        categoria: 1,
                        indice: 0,
                        voto_ela: "",
                        voto_ele: ""
                    });
                }
            });
        }

        function processarDadosFirebase(dados) {
            // Verifica se a rodada ou tema mudou para resetar o estado de voto local
            if (dados.categoria !== categoriaAtual || dados.indice !== perguntaIndice) {
                categoriaAtual = dados.categoria;
                perguntaIndice = dados.indice;
                votadoNestaRodada = false;
                resetTimer();
            }

            const pool = bancoPerguntas[categoriaAtual] || bancoPerguntas[1];
            const dadosPergunta = pool[perguntaIndice];
            
            elCaixaPergunta.textContent = dadosPergunta.p.toUpperCase();
            elCaixaPergunta.className = "";

            // Renderiza as alternativas se o usuário ainda não tiver votado
            if (!votadoNestaRodada) {
                elBtnConfirmar.style.display = "none";
                elOpcoesJogador.innerHTML = "";
                const alternativas = ["A", "B", "C", "D"];
                
                for (let i = 0; i < 4; i++) {
                    const btn = document.createElement("button");
                    btn.className = "btn-opcao";
                    btn.id = `opt-${alternativas[i]}`;
                    btn.textContent = `${alternativas[i]}) ${dadosPergunta.o[i]}`;
                    btn.onclick = () => enviarVotoOnline(alternativas[i]);
                    elOpcoesJogador.appendChild(btn);
                }

                // Exibe status de quem falta jogar
                if (!dados.voto_ela && !dados.voto_ele) {
                    elAlertaStatus.textContent = "NENHUM DOS DOIS RESPONDEU AINDA.";
                } else {
                    const pendente = !dados.voto_ela ? "ELA 👩‍🦰" : "ELE 🧔";
                    elAlertaStatus.textContent = `AGUARDANDO RESPOSTA DE: ${pendente}`;
                }
            }

            // SE OS DOIS JÁ JOGARAM: MOSTRA O RESULTADO NA HORA!
            if (dados.voto_ela && dados.voto_ele) {
                clearInterval(timerInterval);
                votadoNestaRodada = true;
                
                const gabarito = dadosPergunta.r;
                const meuVoto = meuPerfil === "ela" ? dados.voto_ela : dados.voto_ele;
                const votoParceiro = meuPerfil === "ela" ? dados.voto_ele : dados.voto_ela;

                elAlertaStatus.innerHTML = `SEU VOTO: ${meuVoto} | PARCEIRO: ${votoParceiro}`;

                // Pinta as cores de acerto e erro baseadas nas escolhas de vocês
                ["A", "B", "C", "D"].forEach(alt => {
                    const btn = document.getElementById(`opt-${alt}`);
                    if (btn) {
                        if (alt === gabarito) {
                            btn.className = "btn-opcao acerto";
                        } else if (alt === meuVoto || alt === votoParceiro) {
                            btn.className = "btn-opcao erro";
                        }
                    }
                });

                if (meuVoto === gabarito) {
                    elCaixaPergunta.textContent = "VOCÊ ACERTOU! 🎉";
                    elCaixaPergunta.className = "acerto";
                } else {
                    elCaixaPergunta.textContent = "VOCÊ ERROU! 💔";
                    elCaixaPergunta.className = "erro";
                }

                // Libera o botão de avançar para a próxima
                elBtnConfirmar.style.display = "block";
            }
        }

        function enviarVotoOnline(letra) {
            if (votadoNestaRodada) return;
            votadoNestaRodada = true;
            clearInterval(timerInterval); // Trava o tempo do jogador atual

            document.getElementById(`opt-${letra}`).classList.add("selecionado");
            elAlertaStatus.textContent = "SUA RESPOSTA FOI SALVA! AGUARDANDO ELE(A)...";

            // Envia estritamente o seu clique para o nó correspondente do Firebase
            if (meuPerfil === "ela") {
                database.ref("sala_quiz/voto_ela").set(letra);
            } else {
                database.ref("sala_quiz/voto_ele").set(letra);
            }
        }

        function avancarRodadaOnline() {
            // Limpa os votos anteriores no Firebase e pula o índice da pergunta
            database.ref("sala_quiz").update({
                voto_ela: "",
                voto_ele: "",
                indice: perguntaIndice + 1
            });
        }

        function mudarTemaOnline(temaId) {
            // Permite mudar o tema sincronizado para ambos os celulares
            database.ref("sala_quiz").update({
                categoria: temaId,
                indice: 0,
                voto_ela: "",
                voto_ele: ""
            });
        }

        function resetTimer() {
            clearInterval(timerInterval);
            tempoRestante = 15;
            elTempo.textContent = `${tempoRestante}S`;
            timerInterval = setInterval(() => {
                tempoRestante--;
                elTempo.textContent = `${tempoRestante}S`;
                if (tempoRestante <= 0) {
                    clearInterval(timerInterval);
                    if (!votadoNestaRodada) {
                        enviarVotoOnline("N/A");
                    }
                }
            }, 1000);
        }

        function usarPistaDoQuiz() {
            if (votadoNestaRodada) return;
            const pool = bancoPerguntas[categoriaAtual] || bancoPerguntas[1];
            const gabarito = pool[perguntaIndice].r;
            const erradas = ["A", "B", "C", "D"].filter(a => a !== gabarito);
            const sorteada = erradas[Math.floor(Math.random() * erradas.length)];

            const opt = document.getElementById(`opt-${sorteada}`);
            if (opt) {
                opt.style.opacity = "0.3";
                opt.style.pointerEvents = "none";
            }
        }

        function mudarAba(abaId) {
            document.querySelectorAll('.conteudo-aba').forEach(el => el.classList.remove('ativa'));
            document.querySelectorAll('.aba-btn').forEach(el => el.classList.remove('ativa'));
            document.getElementById(abaId).classList.add('ativa');
            event.currentTarget.classList.add('ativa');
        }
    </script>
</body>
</html>
