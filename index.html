<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Grimoire 🔮</title>
    <style>
        body { 
            background: #0a0a0c; color: #d4af37; 
            font-family: 'Courier New', monospace; text-align: center; 
            padding: 10px; margin: 0;
        }
        
        .grimoire { 
            border: 4px solid #d4af37; padding: 20px; max-width: 100%; 
            width: 95%; margin: 10px auto; 
            background: #16161a; box-sizing: border-box;
        }

        h1 { font-size: 24px; text-transform: uppercase; margin-bottom: 20px; }

        .btn-game {
            background: #2a2a35; border: 3px solid #d4af37;
            color: #d4af37; padding: 15px 30px;
            cursor: pointer; font-weight: bold; width: 100%;
            margin: 10px 0; font-size: 18px;
        }

        .mission { 
            border: 2px solid #333; padding: 15px; margin: 10px 0; 
            text-align: left; font-size: 16px; display: flex; 
            justify-content: space-between; align-items: center;
            background: #1e1e24;
        }

        .seal-btn {
            background: #4a3a10; border: 2px solid #d4af37; 
            color: #d4af37; padding: 10px 15px; 
            font-size: 14px; font-weight: bold;
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login" class="grimoire">
        <h1>Pixel Grimoire 🔮</h1>
        <button class="btn-game" onclick="entrar('Ele')">🧔 ENTRAR: ELE</button>
        <button class="btn-game" onclick="entrar('Ela')">👩‍🦰 ENTRAR: ELA</button>
    </div>

    <div id="game" class="grimoire hidden">
        <h2 id="user-title">Grimório de Missões</h2>
        <div id="mission-area"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTmhs9bZp-IuBzqwTxQZlrHu9IHsDmJQA",
            authDomain: "dddua-81207.firebaseapp.com",
            databaseURL: "https://dddua-81207-default-rtdb.firebaseio.com",
            projectId: "dddua-81207",
            storageBucket: "dddua-81207.firebasestorage.app",
            messagingSenderId: "844138746278",
            appId: "1:844138746278:web:341f704f22c106473d7f67",
            measurementId: "G-F4SC83V4KB"
        };
        initializeApp(firebaseConfig);

        // Listas com 50 missões cada
        const missoesEle = Array.from({length: 50}, (_, i) => `${i+1}. Missão ${i+1} para Ele`);
        const missoesEla = Array.from({length: 50}, (_, i) => `${i+1}. Missão ${i+1} para Ela`);

        window.entrar = (nome) => {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            document.getElementById('user-title').innerText = "Grimório de " + nome;
            
            const lista = nome === 'Ele' ? missoesEle : missoesEla;
            const container = document.getElementById('mission-area');
            container.innerHTML = "";
            
            lista.forEach((m) => {
                container.innerHTML += `
                    <div class="mission">
                        <span>${m}</span> 
                        <button class="seal-btn" onclick="this.innerText='✓'; this.style.background='#d4af37'; this.style.color='#000'">✒️</button>
                    </div>`;
            });
        };
    </script>
</body>
</html>
