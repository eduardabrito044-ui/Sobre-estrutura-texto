        let meuPerfil = ""; 
        let categoriaAtual = 1;
        let perguntaIndice = 0;
        let tempoRestante = 15;
        let timerInterval;
        let votadoNestaRodada = false;

        const elCaixaPergunta = document.getElementById("caixa-pergunta");
        const elTempo = document.getElementById("tempo");
        const elOpcoesJogador = document.getElementById("opcoes-jogador");
        const elAlertaStatus = document.getElementById("alerta-status");
        const elBtnConfirmar = document.getElementById("quiz-confirmar");

        window.definirJogador = function(perfil) {
            meuPerfil = perfil;
            document.getElementById("lbl-jogador-atual").textContent = perfil.toUpperCase();
            document.getElementById("tela-perfil").style.display = "none";
            document.getElementById("main-container").style.display = "block";
            
            onValue(salaQuizRef, (snapshot) => {
                const dados = snapshot.val();
                if (dados) {
                    processarDadosFirebase(dados);
                } else {
                    set(salaQuizRef, {
                        categoria: 1,
                        indice: 0,
                        voto_ela: "",
                        voto_ele: ""
                    });
                }
            });
        }

        function processarDadosFirebase(dados) {
            if (dados.categoria !== categoriaAtual || dados.indice !== perguntaIndice) {
                categoriaAtual = dados.categoria;
                perguntaIndice = dados.indice;
                votadoNestaRodada = false;
                resetTimer();
            }

            const pool = bancoPerguntas[categoriaAtual] || bancoPerguntas[1];
            const dadosPergunta = pool[perguntaIndice];
            
            if (!dadosPergunta) {
                elCaixaPergunta.textContent = "FIM DAS PERGUNTAS DESTE TEMA! MUDEM DE CATEGORIA ABAIXO.";
                elOpcoesJogador.innerHTML = "";
                elAlertaStatus.textContent = "";
                elBtnConfirmar.style.display = "none";
                clearInterval(timerInterval);
                return;
            }

            elCaixaPergunta.textContent = dadosPergunta.p.toUpperCase();
            elCaixaPergunta.className = "";

            if (!votadoNestaRodada) {
                elBtnConfirmar.style.display = "none";
                elOpcoesJogador.innerHTML = "";
                const alternativas = ["A", "B", "C", "D"];
                
                for (let i = 0; i < 4; i++) {
                    const btn = document.createElement("button");
                    btn.className = "btn-opcao";
                    btn.id = `opt-${alternativas[i]}`;
                    btn.textContent = `${alternativas[i]}) ${dadosPergunta.o[i]}`;
                    btn.onclick = () => enviarVotoOnline(alternativas[i]);
                    elOpcoesJogador.appendChild(btn);
                }

                if (!dados.voto_ela && !dados.voto_ele) {
                    elAlertaStatus.textContent = "NENHUM DOS DOIS RESPONDEU AINDA.";
                } else {
                    const pendente = !dados.voto_ela ? "ELA 👩‍🦰" : "ELE 🧔";
                    elAlertaStatus.textContent = `AGUARDANDO RESPOSTA DE: ${pendente}`;
                }
            }

            if (dados.voto_ela && dados.voto_ele) {
                clearInterval(timerInterval);
                votadoNestaRodada = true;
                
                const meuVoto = meuPerfil === "ela" ? dados.voto_ela : dados.voto_ele;
                const votoParceiro = meuPerfil === "ela" ? dados.voto_ele : dados.voto_ela;

                elAlertaStatus.innerHTML = `SEU VOTO: ${meuVoto} | PARCEIRO: ${votoParceiro}`;

                const casalAcertou = (dados.voto_ela === dados.voto_ele);

                ["A", "B", "C", "D"].forEach(alt => {
                    const btn = document.getElementById(`opt-${alt}`);
                    if (btn) {
                        if (casalAcertou && alt === meuVoto) {
                            btn.className = "btn-opcao acerto";
                        } else if (!casalAcertou && (alt === meuVoto || alt === votoParceiro)) {
                            btn.className = "btn-opcao erro";
                        }
                    }
                });

                if (casalAcertou) {
                    elCaixaPergunta.textContent = "VOCÊS EM SINTONIA! 🎉 MATCH!";
                    elCaixaPergunta.className = "acerto";
                } else {
                    elCaixaPergunta.textContent = "RESPOSTAS DIFERENTES! 💔";
                    elCaixaPergunta.className = "erro";
                }

                elBtnConfirmar.style.display = "block";
            }
        }

        function enviarVotoOnline(letra) {
            if (votadoNestaRodada) return;
            votadoNestaRodada = true;
            clearInterval(timerInterval);

            const opt = document.getElementById(`opt-${letra}`);
            if (opt) opt.classList.add("selecionado");
            elAlertaStatus.textContent = "SUA RESPOSTA FOI SALVA! AGUARDANDO ELE(A)...";

            if (meuPerfil === "ela") {
                update(salaQuizRef, { voto_ela: letra });
            } else {
                update(salaQuizRef, { voto_ele: letra });
            }
        }

        window.avancarRodadaOnline = function() {
            update(salaQuizRef, {
                voto_ela: "",
                voto_ele: "",
                indice: perguntaIndice + 1
            });
        }

        window.mudarTemaOnline = function(temaId) {
            update(salaQuizRef, {
                categoria: temaId,
                indice: 0,
                voto_ela: "",
                voto_ele: ""
            });
        }

        function resetTimer() {
            clearInterval(timerInterval);
            tempoRestante = 15;
            elTempo.textContent = `${tempoRestante}S`;
            timerInterval = setInterval(() => {
                tempoRestante--;
                elTempo.textContent = `${tempoRestante}S`;
                if (tempoRestante <= 0) {
                    clearInterval(timerInterval);
                    if (!votadoNestaRodada) {
                        enviarVotoOnline("N/A");
                    }
                }
            }, 1000);
        }

        window.mudarAba = function(abaId) {
            document.querySelectorAll('.conteudo-aba').forEach(el => el.classList.remove('ativa'));
            document.querySelectorAll('.aba-btn').forEach(el => el.classList.remove('ativa'));
            document.getElementById(abaId).classList.add('ativa');
            event.currentTarget.classList.add('ativa');
        }
    </script>
