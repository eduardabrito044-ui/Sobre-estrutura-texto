<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Puzzle 50 Pets</title>
    <style>
        /* CSS focado no efeito de encaixe manual */
        .grid-slot { position: relative; border: 1px solid rgba(255,255,255,0.1); }
        
        .puzzle-piece {
            background-size: 500% 500%; /* Ajuste dinâmico conforme a grade */
            width: 100%; height: 100%;
            position: absolute;
            z-index: 2;
            cursor: pointer;
            /* Máscara de encaixe estilo puzzle real */
            clip-path: path("M 10 10 H 90 V 90 H 10 Z"); 
            border: 1px solid #fff;
        }

        /* Classe que desenha a borda ondulada do encaixe */
        .encaixe-puzzle {
            clip-path: path("M 10 10 L 40 10 A 10 10 0 0 1 60 10 L 90 10 L 90 40 A 10 10 0 0 1 90 60 L 90 90 L 60 90 A 10 10 0 0 1 40 90 L 10 90 L 10 60 A 10 10 0 0 1 10 40 Z");
        }
    </style>
</head>
