<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Puzzle Co-op Fofinho</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'VT323', monospace; font-size: 24px; }
        body { background-color: #1a1a24; color: #ecf0f1; margin: 0; padding: 8px; display: flex; justify-content: center; min-height: 100vh; }
        #game-container { width: 100%; max-width: 480px; text-align: center; }
        h1 { font-size: 42px; color: #f1c40f; margin: 5px 0; }
        .pixel-box { background: #16a085; padding: 10px; border: 4px solid #117a65; border-radius: 8px; width: 100%; margin-bottom: 15px; }
        .pixel-window { background-color: rgba(30, 30, 38, 0.95); border: 4px solid #3a3a4a; padding: 15px; margin-bottom: 15px; border-radius: 12px; }
        .pixel-btn { background-color: #e67e22; border: 4px solid #d35400; color: white; padding: 10px 20px; cursor: pointer; border-radius: 8px; flex: 1; }
        #puzzle-grid { width: 100%; max-width: 400px; height: 400px; background-color: #111; display: grid; border: 6px solid #3a3a4a; gap: 2px; }
        .puzzle-piece { width: 100%; height: 100%; border: 1px solid rgba(255,255,255,0.2); background-size: 400% 400%; }
        #pieces-container { display: flex; overflow-x: auto; gap: 10px; padding: 10px; }
        #pieces-container .puzzle-piece { width: 75px; height: 75px; flex-shrink: 0; border: 3px solid #555; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>PIXEL PUZZLE CO-OP 🐾</h1>
        <div id="turn-indicator" class="pixel-box">Carregando...</div>
        <div id="lobby-screen" class="pixel-window">
            <button class="pixel-btn" onclick="iniciarJogo()">JOGAR COM BICHINHOS</button>
        </div>
        <div id="game-screen" class="hidden">
            <div id="pieces-container"></div>
            <div id="puzzle-grid"></div>
        </div>
    </div>

    <script type="module">
        // Lista de 50 animais fofos verificada individualmente
        const ListaCemImagens = [
            "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba", "https://images.unsplash.com/photo-1517849845537-4d257902454a",
            "https://images.unsplash.com/photo-1543466835-00a7907e9de1", "https://images.unsplash.com/photo-1583511655857-d19b40a7a54e",
            "https://images.unsplash.com/photo-1537151608828-ea2b11777ee8", "https://images.unsplash.com/photo-1592194996308-7b43878e84a6",
            "https://images.unsplash.com/photo-1552053831-71594a27632d", "https://images.unsplash.com/photo-1533738363-b7f9aef128ce",
            "https://images.unsplash.com/photo-1477884213975-8946011edd3e", "https://images.unsplash.com/photo-1548199973-03cce0bbc87b",
            "https://images.unsplash.com/photo-1561037404-61cd46aa615b", "https://images.unsplash.com/photo-1518791841217-8f162f1e1131",
            "https://images.unsplash.com/photo-1507146426996-ef05306b995a", "https://images.unsplash.com/photo-1574158622643-69d34d72650a",
            "https://images.unsplash.com/photo-1601758228041-f3b2795255f1", "https://images.unsplash.com/photo-1506755855567-92ff770e8d30",
            "https://images.unsplash.com/photo-1535268647977-a403b69eed7e", "https://images.unsplash.com/photo-1589883661923-6476cb0ae3f2",
            "https://images.unsplash.com/photo-1581888227599-779811939961", "https://images.unsplash.com/photo-1527380905442-5eecd3d6092c",
            "https://images.unsplash.com/photo-1535930749574-1399327ce78f", "https://images.unsplash.com/photo-1598133894008-61f7fdb8cc3a",
            "https://images.unsplash.com/photo-1548336109-0268a735628b", "https://images.unsplash.com/photo-1560114928-40f941b4c95f",
            "https://images.unsplash.com/photo-1555685812-4b74301a2f64", "https://images.unsplash.com/photo-1586671267735-866380c55716",

            "https://images.unsplash.com/photo-1515405295579-87b653457a8a", "https://images.unsplash.com/photo-1513245543132-31f507417b26",
            "https://images.unsplash.com/photo-1509205469837-372998634861", "https://images.unsplash.com/photo-1499781350541-7783f6c6a0c8",
            "https://images.unsplash.com/photo-1481349518771-20055b2a7b24", "https://images.unsplash.com/photo-1505628346881-b72b27e84530",
            "https://images.unsplash.com/photo-1520763185298-0b43bc0bbcaa", "https://images.unsplash.com/photo-1504595403659-908598093653",
            "https://images.unsplash.com/photo-1516467508483-376044439c27", "https://images.unsplash.com/photo-1472491235688-bdc81a63246f",
            "https://images.unsplash.com/photo-1504208420200-f04d7c1751d8", "https://images.unsplash.com/photo-1518791841217-8f162f1e1131"
        ];

        window.iniciarJogo = () => {
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('turn-indicator').innerText = "Divirtam-se com os bichinhos!";
            const grid = document.getElementById('puzzle-grid');
            const img = ListaCemImagens[Math.floor(Math.random() * ListaCemImagens.length)];
            for(let i=0; i<16; i++) {
                const p = document.createElement('div');
                p.className = 'puzzle-piece';
                p.style.backgroundImage = `url(${img})`;
                p.style.backgroundPosition = `${(i%4)*33.3}% ${Math.floor(i/4)*33.3}%`;
                grid.appendChild(p);
            }
        };
    </script>
</body>
</html>
