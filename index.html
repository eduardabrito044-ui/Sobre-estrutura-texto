<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Grimoire RPG ⚔️</title>
    <style>
        body { background: #0a0a0c; color: #d4af37; font-family: 'Courier New', monospace; text-align: center; padding: 10px; }
        .card { border: 2px solid #d4af37; padding: 20px; max-width: 400px; margin: 10px auto; background: #16161a; }
        .mission-box { border: 2px solid #d4af37; padding: 15px; margin: 10px 0; background: #222; }
        .sword { font-size: 50px; margin: 20px; }
        button { background: #d4af37; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        .done { opacity: 0.5; background: #444; }
    </style>
</head>
<body>

    <div id="login" class="card">
        <h1>Pixel Grimoire</h1>
        <button onclick="iniciar('Ele')">Entrar: Ele 🧔</button>
        <button onclick="iniciar('Ela')">Entrar: Ela 👩‍🦰</button>
    </div>

    <div id="game" class="card" style="display:none;">
        <div id="current-sword" class="sword">🗡️</div>
        <div id="mission-list"></div>
    </div>

    <script>
        const missoesEle = [
            "1. Dê um bom dia com um elogio especial.", "2. Envie uma foto do seu dia.", "3. Pergunte: 'Como posso te fazer sorrir hoje?'", "4. Elogie algo que ela fez.", "5. Mande um áudio dizendo que ama.", "6. Planeje um encontro futuro.", "7. Dê 3 motivos por que ela é especial.", "8. Envie uma música que lembra ela.", "9. Mande um 'boa noite' carinhoso.", "10. Diga o que admira no jeito dela.",
            "11. Mande mensagem de 'estou com saudade'.", "12. Elogie o sorriso dela.", "13. Faça um plano divertido.", "14. Envie um meme engraçado.", "15. Diga por que é sortudo.", "16. Elogie a inteligência dela.", "17. Mande 'bom trabalho'.", "18. Diga qual roupa prefere nela.", "19. Apoie ela se estiver cansada.", "20. Diga o que te atrai.",
            "21. Diga que ela é linda.", "22. Diga um sonho com ela.", "23. Envie foto de algo que lembrou ela.", "24. Valorize a conversa de vocês.", "25. Mande um 'bom descanso'.", "26. Diga algo que ela faz que te faz feliz.", "27. Pergunte como foi o dia.", "28. Elogie a dedicação dela.", "29. Diga que espera o encontro.", "30. Mande carinho inesperado.",
            "31. Diga o que gosta no abraço dela.", "32. Mande bom dia com 'te amo'.", "33. Diga algo engraçado.", "34. Elogie o gosto dela.", "35. Mande um 'estou orgulhoso'.", "36. Diga seu momento feliz com ela.", "37. Mande foto sua fazendo algo que ela gosta.", "38. Diga o que aprendeu com ela.", "39. Mande desejo de boa semana.", "40. Diga por que ela é importante.",
            "41. Mande algo ousado sobre saudade.", "42. Diga algo que quer fazer com ela.", "43. Elogie o olhar dela.", "44. Diga que ela é sua inspiração.", "45. Mande mensagem de total carinho.", "46. Diga o que mudou por ela.", "47. Mande mensagem com desejo.", "48. Elogie a personalidade dela.", "49. Diga o quanto ela é única.", "50. Mande um 'você é meu tudo'."
        ];

        const missoesEla = [
            "1. Dê um bom dia com carinho.", "2. Envie uma selfie.", "3. Pergunte: 'O que te deixa feliz hoje?'", "4. Elogie o esforço dele.", "5. Mande áudio dizendo que se importa.", "6. Pense em surpresa para ele.", "7. Dê 3 motivos por que ele é especial.", "8. Envie uma música para ele.", "9. Mande um 'boa noite' doce.", "10. Diga o que gosta na companhia dele.",
            "11. Mande mensagem pensando nele.", "12. Elogie o jeito dele resolver coisas.", "13. Fale o que quer fazer com ele.", "14. Envie vídeo engraçado.", "15. Diga por que ele te faz bem.", "16. Elogie a determinação dele.", "17. Mande mensagem de motivação.", "18. Elogie a voz dele.", "19. Mande abraço virtual.", "20. Diga o que te atrai nele.",
            "21. Diga que ele é incrível.", "22. Diga desejo com ele.", "23. Envie foto que lembrou ele.", "24. Valorize o apoio dele.", "25. Mande um 'bom descanso'.", "26. Diga algo que ele faz que te faz rir.", "27. Pergunte sobre o dia dele.", "28. Elogie a inteligência dele.", "29. Diga que espera o encontro.", "30. Mande carinho sem motivo.",
            "31. Diga o que gosta no beijo dele.", "32. Mande bom dia especial.", "33. Diga algo fofo.", "34. Elogie o cuidado dele.", "35. Mande um 'você é meu orgulho'.", "36. Diga o momento com ele.", "37. Mande selfie sorrindo.", "38. Elogie o caráter dele.", "39. Mande um beijo.", "40. Diga por que escolheu ele.",
            "41. Mande mensagem provocante.", "42. Diga o que quer fazer com ele.", "43. Elogie como ele te protege.", "44. Diga que ele é seu porto seguro.", "45. Mande mensagem de afeto.", "46. Diga o que mudou desde que o conheceu.", "47. Mande mensagem expressando paixão.", "48. Elogie o humor dele.", "49. Diga o quanto ele é maravilhoso.", "50. Mande um 'você é meu amor'."
        ];

        let userType = "";
        let index = 0;
        let progressoIndividual = [false, false];

        function iniciar(tipo) {
            userType = tipo;
            document.getElementById('login').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            renderizar();
        }

        function renderizar() {
            const list = document.getElementById('mission-list');
            list.innerHTML = "";
            const lista = userType === 'Ele' ? missoesEle : missoesEla;
            
            for(let i = 0; i < 2; i++) {
                let mIndex = index + i;
                if(mIndex < lista.length) {
                    list.innerHTML += `
                        <div class="mission-box ${progressoIndividual[i] ? 'done' : ''}" id="m${i}">
                            <p>${lista[mIndex]}</p>
                            <button onclick="cumprir(${i})" ${progressoIndividual[i] ? 'disabled' : ''}>Cumpri!</button>
                        </div>`;
                }
            }
        }

        function cumprir(i) {
            progressoIndividual[i] = true;
            document.getElementById('m' + i).classList.add('done');
            
            if(progressoIndividual[0] && progressoIndividual[1]) {
                index += 2;
                progressoIndividual = [false, false];
                renderizar();
            }
        }
    </script>
</body>
</html>
