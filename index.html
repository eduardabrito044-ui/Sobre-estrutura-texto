<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Puzzle 100 - Co-op</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'VT323', monospace; font-size: 24px; image-rendering: pixelated; }
        body { background-color: #1a1a24; color: #ecf0f1; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        #game-container { width: 100%; max-width: 480px; text-align: center; }
        h1 { font-size: 38px; color: #f1c40f; margin: 10px 0; }
        .pixel-window { background-color: #2c2c38; border: 4px solid #3a3a4a; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .pixel-btn { background-color: #e67e22; border: 4px solid #d35400; color: white; padding: 10px; cursor: pointer; border-radius: 8px; width: 100%; font-size: 22px; }
        #puzzle-grid { display: grid; background: #111; border: 6px solid #3a3a4a; margin: 0 auto; }
        .puzzle-piece { background-repeat: no-repeat; width: 100%; height: 100%; position: relative; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>PUZZLE 100 PETS</h1>
        <div id="lobby" class="pixel-window">
            <button id="btn-start" class="pixel-btn">CARREGAR 100 IMAGENS E JOGAR</button>
        </div>
        <div id="game-screen" class="hidden">
            <div id="puzzle-grid"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

        // Lista das 100 imagens (Prevenção e diversidade)
        const ListaCemImagens = Array.from({length: 100}, (_, i) => 
            `https://picsum.photos/id/${i + 10}/600/600`
        );

        const app = initializeApp({
            databaseURL: "https://dddua-81207-default-rtdb.firebaseio.com"
        });
        const db = getDatabase(app);
        
        document.getElementById('btn-start').onclick = async () => {
            const url = ListaCemImagens[Math.floor(Math.random() * 100)];
            await set(ref(db, 'partidas/SALA_100'), {
                imagem: url,
                timestamp: Date.now()
            });
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        };

        onValue(ref(db, 'partidas/SALA_100'), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            const grid = document.getElementById('puzzle-grid');
            grid.style.width = "400px";
            grid.style.height = "400px";
            grid.style.gridTemplateColumns = "repeat(4, 1fr)";
            grid.innerHTML = "";
            for(let i=0; i<16; i++) {
                const div = document.createElement('div');
                div.className = 'puzzle-piece';
                div.style.backgroundImage = `url(${data.imagem})`;
                div.style.backgroundSize = "400% 400%";
                div.style.backgroundPosition = `${(i%4)*33.3}% ${Math.floor(i/4)*33.3}%`;
                div.style.border = "1px solid #000";
                grid.appendChild(div);
            }
        });
    </script>
</body>
</html>
