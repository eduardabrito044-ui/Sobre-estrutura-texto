<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Puzzle Co-op</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'VT323', monospace; }
        body { background: #1a1a24; color: #fff; margin: 0; padding: 10px; display: flex; justify-content: center; }
        #game-container { width: 100%; max-width: 480px; text-align: center; }
        .pixel-window { background: #2c3e50; border: 4px solid #34495e; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .pixel-btn { background: #27ae60; border: 4px solid #1e8449; color: white; padding: 12px; cursor: pointer; border-radius: 8px; width: 100%; font-size: 24px; }
        
        /* Grade e Peças */
        #puzzle-grid { display: grid; gap: 4px; background: #111; padding: 5px; border: 4px solid #34495e; margin: 0 auto; width: 100%; max-width: 400px; }
        .grid-slot { aspect-ratio: 1; background: rgba(0,0,0,0.3); border: 2px dashed rgba(255,255,255,0.1); }
        .puzzle-piece { width: 100%; height: 100%; background-repeat: no-repeat; border-radius: 6px; border: 2px solid #fff; cursor: pointer; box-shadow: 2px 2px 0px rgba(0,0,0,0.5); }
        .puzzle-piece.selecionada { outline: 4px solid #f1c40f; transform: scale(1.05); }
        
        #pieces-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px; background: #2c3e50; border-radius: 8px; min-height: 80px; margin-bottom: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>PIXEL PUZZLE CO-OP 🐾</h1>
        <div id="game-screen">
            <button id="btn-novo" class="pixel-btn">Novo Bichinho 🔄</button>
            <div id="pieces-container"></div>
            <div id="puzzle-grid"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

        const db = getDatabase(initializeApp({ apiKey: "AIzaSyBTmhs9bZp-IuBzqwTxQZlrHu9IHsDmJQA", databaseURL: "https://dddua-81207-default-rtdb.firebaseio.com" }));
        const fotos = ["https://images.unsplash.com/photo-1543466835-00a7907e9de1","https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba","https://images.unsplash.com/photo-1537151608828-ea2b11777ee8","https://images.unsplash.com/photo-1573865526739-10659fec78a5"];
        
        let pecaSel = null, grade = 4;

        document.getElementById('btn-novo').onclick = () => {
            set(ref(db, 'partida'), { 
                img: fotos[Math.floor(Math.random()*fotos.length)], 
                ordem: Array.from({length: grade**2}, (_,i) => i).sort(() => Math.random() - 0.5),
                encaixadas: { "init": true }
            });
        };

        onValue(ref(db, 'partida'), (snap) => {
            const d = snap.val(); if(!d) return;
            const grid = document.getElementById('puzzle-grid'), cont = document.getElementById('pieces-container');
            grid.innerHTML = ""; cont.innerHTML = ""; grid.style.gridTemplateColumns = `repeat(${grade}, 1fr)`;
            
            for(let i=0; i<grade**2; i++) {
                const slot = document.createElement('div'); slot.className = 'grid-slot';
                if(d.encaixadas?.[i]) slot.appendChild(criarPeca(i, d.img));
                slot.onclick = () => { if(pecaSel === i) { update(ref(db, 'partida/encaixadas'), {[i]: true}); pecaSel = null; } };
                grid.appendChild(slot);
            }
            d.ordem.forEach(id => {
                if(!d.encaixadas?.[id]) {
                    const p = criarPeca(id, d.img);
                    if(pecaSel === id) p.classList.add('selecionada');
                    p.onclick = () => { pecaSel = id; render(); };
                    cont.appendChild(p);
                }
            });
        });

        function criarPeca(id, url) {
            const p = document.createElement('div'); p.className = 'puzzle-piece';
            p.style.backgroundImage = `url(${url})`;
            p.style.backgroundSize = `${grade*100}% ${grade*100}%`;
            p.style.backgroundPosition = `${(id%grade)/(grade-1)*100}% ${Math.floor(id/grade)/(grade-1)*100}%`;
            return p;
        }
    </script>
</body>
</html>
