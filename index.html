<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pixel Quest: Casal 🎮</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        body { background: #fdf6e3; color: #5d4037; font-family: 'Indie Flower', cursive; text-align: center; padding: 20px; }
        .caderno-window { 
            background: #ffffff; border: 2px solid #ddd; padding: 25px; 
            border-radius: 15px; max-width: 400px; margin: 0 auto;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }
        h1 { font-size: 40px; color: #ff80ab; text-shadow: 2px 2px #ffebee; }
        
        .mission-item { 
            background: #fff3e0; border: 2px dashed #ffcc80; padding: 15px; 
            margin: 15px 0; border-radius: 10px; display: flex; 
            justify-content: space-between; align-items: center;
        }

        /* Botão super fofo e estilizado */
        .btn-check { 
            background: #b2dfdb; border: none; padding: 10px 20px; 
            border-radius: 50px; cursor: pointer; font-family: 'Indie Flower';
            font-size: 20px; color: #004d40; box-shadow: 0 4px #80cbc4;
            transition: all 0.2s;
        }
        .btn-check:hover { background: #80cbc4; transform: scale(1.1); }
        
        .emoji-art { font-size: 30px; margin: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="caderno-window">
        <h1>Pixel Quest ✍️</h1>
        <p>Quem vai completar missão hoje?</p>
        <button class="btn-check" onclick="entrar('Ele')">🧔 Ele</button>
        <button class="btn-check" onclick="entrar('Ela')">👩‍🦰 Ela</button>
    </div>

    <div id="game-screen" class="caderno-window hidden">
        <h1 id="user-title">Missões do Dia ✨</h1>
        <div id="mission-list">
            <div class="mission-item">
                <span>Enviar elogio criativo 💌</span>
                <button class="btn-check" onclick="completar('elogio')">OK! ✅</button>
            </div>
            <div class="mission-item">
                <span>Foto de um momento fofo 📸</span>
                <button class="btn-check" onclick="completar('foto')">OK! ✅</button>
            </div>
        </div>
        <p class="emoji-art">🌟 Pontos de Conexão: <span id="pontos">0</span> 🌟</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTmhs9bZp-IuBzqwTxQZlrHu9IHsDmJQA",
            authDomain: "dddua-81207.firebaseapp.com",
            databaseURL: "https://dddua-81207-default-rtdb.firebaseio.com",
            projectId: "dddua-81207",
            storageBucket: "dddua-81207.firebasestorage.app",
            messagingSenderId: "844138746278",
            appId: "1:844138746278:web:341f704f22c106473d7f67",
            measurementId: "G-F4SC83V4KB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, 'pixel_quest');

        window.entrar = (nome) => {
            document.getElementById('user-title').innerText = "Olá, " + nome + "! ✨";
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        };

        window.completar = (id) => {
            alert("Missão completada com sucesso! ✨💖");
            update(gameRef, { [id]: true });
        };

        onValue(gameRef, (snapshot) => {
            const data = snapshot.val() || {};
            let score = Object.keys(data).length;
            document.getElementById('pontos').innerText = score;
        });
    </script>
</body>
</html>
