<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Mundo - Jogo de Convivência</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
        }

        #jogo-container {
            text-align: center;
        }

        canvas {
            border: 4px solid #fff;
            background-color: #7bed9f; 
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.5);
            image-rendering: pixelated; /* Mantém o pixel art nítido */
        }

        .controles-info {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="jogo-container">
        <h2>Nosso Mundo: Simulador Co-op</h2>
        <canvas id="telaJogo" width="800" height="600"></canvas>
        <div class="controles-info">Use as setas ou WASD para mover o personagem</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ==========================================
        // 1. CONFIGURAÇÃO DO JOGO & CANVAS
        // ==========================================
        const canvas = document.getElementById("telaJogo");
        const ctx = canvas.getContext("2d");

        // Carregar as folhas de sprites inteiras
        const imgJogador1 = new Image();
        imgJogador1.src = "jogador1.png"; 

        const imgJogador2 = new Image();
        imgJogador2.src = "jogador2.png"; 

        // ==========================================
        // 2. DIMENSÕES DO RECORTE (Ajuste se necessário)
        // Cada bonequinho na folha tem um tamanho fixo de recorte
        // ==========================================
        const LARGURA_SPRITE = 48; // Largura de cada "quadrado" do boneco na imagem
        const ALTURA_SPRITE = 96;  // Altura de cada "quadrado" do boneco na imagem

        // Mapeamento das linhas da imagem para as direções
        const DIRECOES = {
            FRENTE: 0,
            COSTAS: 1,
            ESQUERDA: 2,
            DIREITA: 3
        };

        // ==========================================
        // 3. ESTRUTURA DOS JOGADORES
        // ==========================================
        const jogador1 = {
            x: 350,
            y: 300,
            velocidade: 3,
            larguraTela: 48,  // Tamanho final no jogo
            alturaTela: 96,
            direcao: DIRECOES.FRENTE, // Linha atual do sprite
            frameAtual: 0,            // Coluna atual do sprite (para bater as pernas)
            contadorAnimacao: 0,      // Controla a velocidade dos passos
            andando: false
        };

        const jogador2 = {
            x: 450,
            y: 300,
            larguraTela: 48,
            alturaTela: 96,
            direcao: DIRECOES.FRENTE,
            frameAtual: 0,
            andando: false
        };

        // Capturar teclado
        const teclas = {};
        window.addEventListener("keydown", (e) => { teclas[e.key.toLowerCase()] = true; });
        window.addEventListener("keyup", (e) => { teclas[e.key.toLowerCase()] = false; });

        // ==========================================
        // 4. FUNÇÃO PARA DESENHAR O SPRITE RECORTADO
        // ==========================================
        function desenharPersonagem(img, dados) {
            if (img.complete) {
                // Calcula a posição X e Y exata do recorte dentro da imagem grande
                let clipX = dados.frameAtual * LARGURA_SPRITE;
                let clipY = dados.direcao * ALTURA_SPRITE;

                ctx.drawImage(
                    img,
                    clipX, clipY, LARGURA_SPRITE, ALTURA_SPRITE, // Onde recortar na imagem
                    dados.x, dados.y, dados.larguraTela, dados.alturaTela // Onde desenhar na tela
                );
            } else {
                // Desenho temporário caso a imagem falhe
                ctx.fillStyle = "#8B4513";
                ctx.fillRect(dados.x, dados.y, dados.larguraTela, dados.alturaTela);
            }
        }

        // ==========================================
        // 5. LOOP PRINCIPAL
        // ==========================================
        function atualizarJogo() {
            jogador1.andando = false;

            // Movimentação e definição de direção do Jogador 1
            if (teclas["arrowup"] || teclas["w"]) {
                jogador1.y -= jogador1.velocidade;
                jogador1.direcao = DIRECOES.COSTAS;
                jogador1.andando = true;
            }
            else if (teclas["arrowdown"] || teclas["s"]) {
                jogador1.y += jogador1.velocidade;
                jogador1.direcao = DIRECOES.FRENTE;
                jogador1.andando = true;
            }
            
            if (teclas["arrowleft"] || teclas["a"]) {
                jogador1.x -= jogador1.velocidade;
                jogador1.direcao = DIRECOES.ESQUERDA;
                jogador1.andando = true;
            }
            else if (teclas["arrowright"] || teclas["d"]) {
                jogador1.x += jogador1.velocidade;
                jogador1.direcao = DIRECOES.DIREITA;
                jogador1.andando = true;
            }

            // Controle da Animação dos Passos (Troca de colunas na imagem)
            if (jogador1.andando) {
                jogador1.contadorAnimacao++;
                if (jogador1.contadorAnimacao >= 10) { // Velocidade da troca de passos
                    jogador1.frameAtual = (jogador1.frameAtual + 1) % 4; // Alterna entre as colunas 0, 1, 2, 3
                    jogador1.contadorAnimacao = 0;
                }
            } else {
                jogador1.frameAtual = 0; // Se parar, fica no frame neutro (em pé de frente/costas/lado)
            }

            // Limites do mapa
            if (jogador1.x < 0) jogador1.x = 0;
            if (jogador1.y < 0) jogador1.y = 0;
            if (jogador1.x > canvas.width - jogador1.larguraTela) jogador1.x = canvas.width - jogador1.larguraTela;
            if (jogador1.y > canvas.height - jogador1.alturaTela) jogador1.y = canvas.height - jogador1.alturaTela;

            // Renderização gráfica
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Chão
            ctx.fillStyle = "#7bed9f";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenhar os dois avatares com recorte automático
            desenharPersonagem(imgJogador1, jogador1);
            desenharPersonagem(imgJogador2, jogador2);

            requestAnimationFrame(atualizarJogo);
        }

        // Iniciar
        atualizarJogo();
    </script>
</body>
</html>
