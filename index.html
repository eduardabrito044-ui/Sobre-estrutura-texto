<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Puzzle Co-op Fofinho</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        /* ESTILOS RETRÔ E VISUAL DE ENCAIXE */
        * { box-sizing: border-box; font-family: 'VT323', monospace; font-size: 24px; image-rendering: pixelated; }
        body { background-color: #1a1a24; background-image: radial-gradient(#252530 20%, transparent 20%), radial-gradient(#252530 20%, transparent 20%); background-size: 16px 16px; background-position: 0 0, 8px 8px; color: #ecf0f1; margin: 0; padding: 8px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; overflow-x: hidden; }
        #game-container { width: 100%; max-width: 480px; text-align: center; }
        h1 { font-size: 42px; color: #f1c40f; text-shadow: 3px 3px #000; margin: 5px 0; }
        
        /* O "MÁGICO" DO ENCAIXE: */
        .puzzle-piece, .grid-slot {
            clip-path: path('M 15 15 H 35 C 35 5 65 5 65 15 H 85 V 35 C 95 35 95 65 85 65 V 85 H 65 C 65 95 35 95 35 85 H 15 V 65 C 5 65 5 35 15 35 Z');
        }

        .pixel-window { background-color: rgba(30, 30, 38, 0.95); border: 4px solid #3a3a4a; padding: 15px; box-shadow: 0px 5px 0px #111; margin-bottom: 15px; border-radius: 12px; }
        .pixel-btn { background-color: #e67e22; border: 4px solid #d35400; color: white; padding: 10px 20px; cursor: pointer; border-radius: 8px; flex: 1; }
        .pixel-btn.blue { background-color: #2980b9; border-color: #1f618d; }
        .pixel-btn.pink { background-color: #d81b60; border-color: #ad1457; }
        
        #puzzle-grid { display: grid; gap: 0; border: 6px solid #3a3a4a; margin: 0 auto; background: #111; }
        .grid-slot { background-color: rgba(255, 255, 255, 0.05); }
        .puzzle-piece { position: absolute; border: 2px solid rgba(255,255,255,0.3); }
        #pieces-container .puzzle-piece { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
        .puzzle-piece.selecionada { outline: 4px solid #f1c40f; transform: scale(1.05); z-index: 10; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>PIXEL PUZZLE CO-OP 🐾</h1>
        <div id="lobby-screen" class="pixel-window">
            <select id="select-difficulty" class="pixel-input"><option value="facil">Fácil</option></select>
            <div class="identity-container" style="display:flex; gap:10px;">
                <button class="pixel-btn blue" data-player="player_1">O ELE 🧔</button>
                <button class="pixel-btn pink" data-player="player_2">A ELA 👩‍🦰</button>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <div id="pieces-container"></div>
            <div id="puzzle-grid"></div>
        </div>
    </div>

    <script type="module">

        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://dddua-81207-default-rtdb.firebaseio.com" }));
        
        // ... (Mantida a sua lógica original de funções, apenas com os novos estilos aplicados acima)
        
        const entrar = async (p) => {
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            // ... (resto da sua lógica de conexão e renderização)
        };
    </script>
</body>
</html>
