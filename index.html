<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Grimoire RPG</title>
    <style>
        body { background: #0a0a0c; color: #d4af37; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; }
        .card { border: 2px solid #d4af37; padding: 20px; max-width: 100%; width: 90%; margin: 10px auto; background: #16161a; box-sizing: border-box; }
        .mission-box { border: 1px solid #d4af37; padding: 15px; margin: 15px 0; background: #222; border-radius: 8px; }
        .sword { font-size: 40px; margin: 10px; }
        button { background: #d4af37; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; color: black; font-size: 16px; border-radius: 5px; width: 100%; margin-top: 10px; }
        button:disabled { background: #555; color: #ccc; }
        .done { opacity: 0.5; background: #000; }
        h1, h2 { font-size: 20px; }
    </style>
</head>
<body>
    <div id="login" class="card">
        <h1>Pixel Grimoire</h1>
        <button onclick="iniciar('Ele')">Entrar: Ele 🧔</button>
        <button onclick="iniciar('Ela')">Entrar: Ela 👩‍🦰</button>
    </div>

    <div id="game" class="card" style="display:none;">
        <h2 id="user-title"></h2>
        <div id="current-sword" class="sword">🗡️</div>
        <div id="mission-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTmhs9bZp-IuBzqwTxQZlrHu9IHsDmJQA",
            authDomain: "dddua-81207.firebaseapp.com",
            databaseURL: "https://dddua-81207-default-rtdb.firebaseio.com",
            projectId: "dddua-81207",
            storageBucket: "dddua-81207.firebasestorage.app",
            messagingSenderId: "844138746278",
            appId: "1:844138746278:web:341f704f22c106473d7f67"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        // Listas com 50 missões
        const missoesEle = ["1. Dê um bom dia especial e diga algo que admira nela.", "2. Envie uma foto do seu dia agora.", /* ... continue até 50 ... */];
        const missoesEla = ["1. Dê um bom dia com carinho.", "2. Envie uma selfie para ele.", /* ... continue até 50 ... */];

        let userType = ""; let index = 0; let progresso = [false, false];

        window.iniciar = (tipo) => {
            userType = tipo;
            document.getElementById('login').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            document.getElementById('user-title').innerText = "Grimório de " + tipo;
            onValue(ref(db, 'progresso/' + tipo), (snapshot) => {
                const data = snapshot.val();
                if(data) { index = data.index; progresso = data.status; }
                renderizar();
            }, { onlyOnce: true });
        };

        window.renderizar = () => {
            const list = document.getElementById('mission-list');
            list.innerHTML = "";
            const lista = userType === 'Ele' ? missoesEle : missoesEla;
            for(let i = 0; i < 2; i++) {
                if(index + i < lista.length) {
                    list.innerHTML += `
                        <div class="mission-box ${progresso[i] ? 'done' : ''}">
                            <p>${lista[index + i]}</p>
                            <button onclick="cumprir(${i})" ${progresso[i] ? 'disabled' : ''}>${progresso[i] ? 'Concluído' : 'Cumpri!'}</button>
                        </div>`;
                }
            }
        };

        window.cumprir = (i) => {
            progresso[i] = true;
            if(progresso[0] && progresso[1]) { index += 2; progresso = [false, false]; }
            renderizar();
            update(ref(db, 'progresso/' + userType), { index: index, status: progresso });
        };
    </script>
</body>
</html>
