<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nosso Mundo - Jogo de Convivência</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a24;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            overflow: hidden;
            user-select: none;
        }

        #jogo-container {
            position: relative;
            text-align: center;
        }

        canvas {
            border: 6px solid #4a3b32;
            border-radius: 8px;
            background-color: #55b67e; 
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.7);
            image-rendering: pixelated;
            max-width: 95vw;
            max-height: 60vh;
        }

        /* Controles Virtuais para Celular */
        #controles-celular {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            padding: 15px;
            box-sizing: border-box;
        }

        .D-pad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 5px;
        }

        .btn-game {
            background: #4a3b32;
            border: 2px solid #fff;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px #2c211a;
        }

        .btn-game:active {
            transform: translateY(4px);
            box-shadow: 0 0 #2c211a;
        }

        .btn-cima { grid-column: 2; grid-row: 1; }
        .btn-esquerda { grid-column: 1; grid-row: 2; }
        .btn-baixo { grid-column: 2; grid-row: 2; }
        .btn-direita { grid-column: 3; grid-row: 2; }

        .botoes-acao {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-acao {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="jogo-container">
        <h2 style="margin-bottom: 10px; text-shadow: 2px 2px #000;">Nosso Mundo</h2>
        <canvas id="telaJogo" width="800" height="500"></canvas>
    </div>

    <div id="controles-celular">
        <div class="D-pad">
            <button class="btn-game btn-cima" id="btn-w">↑</button>
            <button class="btn-game btn-esquerda" id="btn-a">←</button>
            <button class="btn-game btn-baixo" id="btn-s">↓</button>
            <button class="btn-game btn-direita" id="btn-d">→</button>
        </div>
        <div class="botoes-acao">
            <button class="btn-game btn-acao" id="btn-pulo" style="background: #2980b9;">PULAR</button>
            <button class="btn-game btn-acao" id="btn-usar" style="background: #27ae60;">PEGAR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("telaJogo");
        const ctx = canvas.getContext("2d");

        const imgJogador1 = new Image();
        imgJogador1.src = "jogador1.png"; 
        const imgJogador2 = new Image();
        imgJogador2.src = "jogador2.png"; 

        // AJUSTE DOS RECORTES (Pula o título da imagem)
        const LARGURA_SPRITE = 48; 
        const ALTURA_SPRITE = 90;  
        const OFFSET_Y = 120; // Pula os textos "COZY AVATAR" do topo da imagem

        const DIRECOES = { FRENTE: 0, COSTAS: 1, ESQUERDA: 2, DIREITA: 3 };

        // Estrutura do Jogador 1 com Física de Pulo e Gravidade
        const jogador1 = {
            x: 200,
            y: 300,
            z: 0,               // Altura do pulo (eixo Z falso)
            velY_pulo: 0,       // Velocidade vertical do pulo
            gravidade: 0.6,
            velocidade: 4,
            larguraTela: 55,
            alturaTela: 100,
            direcao: DIRECOES.FRENTE,
            frameAtual: 0,
            contadorAnimacao: 0,
            andando: false,
            estaPulando: false,
            escalaLeve: 1       // Para o efeito de respiração leve (idle)
        };

        const jogador2 = {
            x: 400,
            y: 300,
            z: 0,
            larguraTela: 55,
            alturaTela: 100,
            direcao: DIRECOES.FRENTE,
            frameAtual: 0,
            andando: false,
            escalaLeve: 1
        };

        // Inputs (Teclado + Celular)
        const botoes = { w: false, a: false, s: false, d: false, pulo: false };

        // Eventos Teclado
        window.addEventListener("keydown", (e) => { mapearTeclado(e.key.toLowerCase(), true); });
        window.addEventListener("keyup", (e) => { mapearTeclado(e.key.toLowerCase(), false); });

        function mapearTeclado(tecla, status) {
            if (tecla === "arrowup" || tecla === "w") botoes.w = status;
            if (tecla === "arrowdown" || tecla === "s") botoes.s = status;
            if (tecla === "arrowleft" || tecla === "a") botoes.a = status;
            if (tecla === "arrowright" || tecla === "d") botoes.d = status;
            if (tecla === " " || tecla === "spacebar") botoes.pulo = status;
        }

        // Eventos Celular (Toque na tela)
        const configurarBotaoCelular = (id, propriedade) => {
            const el = document.getElementById(id);
            el.addEventListener("touchstart", (e) => { e.preventDefault(); botoes[propriedade] = true; });
            el.addEventListener("touchend", (e) => { e.preventDefault(); botoes[propriedade] = false; });
        };
        configurarBotaoCelular("btn-w", "w");
        configurarBotaoCelular("btn-s", "s");
        configurarBotaoCelular("btn-a", "a");
        configurarBotaoCelular("btn-d", "d");
        configurarBotaoCelular("btn-pulo", "pulo");

        function desenharPersonagem(img, dados) {
            if (img.complete) {
                let clipX = dados.frameAtual * LARGURA_SPRITE;
                // Aplica o OFFSET_Y para ignorar o título escrito na imagem
                let clipY = OFFSET_Y + (dados.direcao * ALTURA_SPRITE);

                ctx.save();
                // Efeito visual de pulo: desloca o desenho para cima com base no "z"
                ctx.translate(dados.x, dados.y - dados.z);
                
                // Inventação/respiração leve: Altera levemente a escala de altura quando parado
                ctx.drawImage(
                    img,
                    clipX, clipY, LARGURA_SPRITE, ALTURA_SPRITE,
                    0, 0, dados.larguraTela, dados.alturaTela * dados.escalaLeve
                );
                ctx.restore();
            }
        }

        function atualizarJogo() {
            jogador1.andando = false;

            // Movimento
            if (botoes.w) { jogador1.y -= jogador1.velocidade; jogador1.direcao = DIRECOES.COSTAS; jogador1.andando = true; }
            else if (botoes.s) { jogador1.y += jogador1.velocidade; jogador1.direcao = DIRECOES.FRENTE; jogador1.andando = true; }
            if (botoes.a) { jogador1.x -= jogador1.velocidade; jogador1.direcao = DIRECOES.ESQUERDA; jogador1.andando = true; }
            else if (botoes.d) { jogador1.x += jogador1.velocidade; jogador1.direcao = DIRECOES.DIREITA; jogador1.andando = true; }

            // Lógica do Pulo (Física básica)
            if (botoes.pulo && !jogador1.estaPulando) {
                jogador1.velY_pulo = -10; // Força do pulo
                jogador1.estaPulando = true;
            }

            if (jogador1.estaPulando) {
                jogador1.z -= jogador1.velY_pulo;
                jogador1.velY_pulo += jogador1.gravidade; // Aplica gravidade

                if (jogador1.z <= 0) { // Tocou o chão
                    jogador1.z = 0;
                    jogador1.estaPulando = false;
                }
            }

            // Animação de Passos vs Respiração Leve (Idle)
            jogador1.contadorAnimacao++;
            if (jogador1.andando) {
                if (jogador1.contadorAnimacao >= 8) {
                    jogador1.frameAtual = (jogador1.frameAtual + 1) % 4;
                    jogador1.contadorAnimacao = 0;
                }
                jogador1.escalaLeve = 1;
            } else {
                jogador1.frameAtual = 0;
                // Efeito fofo de "respirar" bem devagar usando Seno
                jogador1.escalaLeve = 1 + Math.sin(Date.now() * 0.004) * 0.02;
            }

            // Efeito idle para jogador 2 também
            jogador2.escalaLeve = 1 + Math.sin(Date.now() * 0.003) * 0.02;

            // Limites da tela
            if (jogador1.x < 0) jogador1.x = 0;
            if (jogador1.y < 100) jogador1.y = 100; // Impede sumir no topo
            if (jogador1.x > canvas.width - jogador1.larguraTela) jogador1.x = canvas.width - jogador1.larguraTela;
            if (jogador1.y > canvas.height - jogador1.alturaTela) jogador1.y = canvas.height - jogador1.alturaTela;

            // Renderizar Cenário
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#55b67e"; // Grama bonita
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Sombra dos personagens (Dá profundidade e deixa lindo)
            ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
            ctx.beginPath();
            ctx.ellipse(jogador1.x + 28, jogador1.y + 95, 20, 8, 0, 0, Math.PI * 2);
            ctx.ellipse(jogador2.x + 28, jogador2.y + 95, 20, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Desenhar bonecos
            desenharPersonagem(imgJogador1, jogador1);
            desenharPersonagem(imgJogador2, jogador2);

            requestAnimationFrame(atualizarJogo);
        }

        atualizarJogo();
    </script>
</body>
</html>
