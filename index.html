<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Grimoire RPG ⚔️</title>
    <style>
        body { background: #0a0a0c; color: #d4af37; font-family: 'Courier New', monospace; text-align: center; padding: 10px; }
        .card { border: 2px solid #d4af37; padding: 20px; max-width: 400px; margin: 10px auto; background: #16161a; }
        .mission-box { border: 2px solid #d4af37; padding: 15px; margin: 10px 0; background: #222; }
        .sword { font-size: 50px; margin: 20px; filter: drop-shadow(0 0 10px #d4af37); }
        button { background: #d4af37; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; color: black; }
        button:disabled { background: #555; color: #ccc; cursor: not-allowed; }
        .done { opacity: 0.5; background: #000; }
    </style>
</head>
<body>

    <div id="login" class="card">
        <h1>Pixel Grimoire</h1>
        <button onclick="iniciar('Ele')">Entrar: Ele 🧔</button>
        <button onclick="iniciar('Ela')">Entrar: Ela 👩‍🦰</button>
    </div>

    <div id="game" class="card" style="display:none;">
        <h2 id="user-title"></h2>
        <div id="current-sword" class="sword">🗡️</div>
        <div id="mission-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBTmhs9bZp-IuBzqwTxQZlrHu9IHsDmJQA",
            authDomain: "dddua-81207.firebaseapp.com",
            databaseURL: "https://dddua-81207-default-rtdb.firebaseio.com",
            projectId: "dddua-81207",
            storageBucket: "dddua-81207.firebasestorage.app",
            messagingSenderId: "844138746278",
            appId: "1:844138746278:web:341f704f22c106473d7f67"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        // Suas listas de missões
        const missoesEle = ["1. Dê bom dia elogiando o sorriso dela.", "2. Envie uma foto do seu café.", /* ... preencha até 50 ... */];
        const missoesEla = ["1. Dê um bom dia com carinho.", "2. Envie uma selfie fofa.", /* ... preencha até 50 ... */];

        let userType = "";
        let index = 0;
        let progresso = [false, false];

        window.iniciar = (tipo) => {
            userType = tipo;
            document.getElementById('login').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            document.getElementById('user-title').innerText = "Grimório de " + tipo;

            onValue(ref(db, 'progresso/' + tipo), (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    index = data.index || 0;
                    progresso = data.status || [false, false];
                }
                renderizar();
            });
        };

        window.renderizar = () => {
            const list = document.getElementById('mission-list');
            list.innerHTML = "";
            const lista = userType === 'Ele' ? missoesEle : missoesEla;
            
            for(let i = 0; i < 2; i++) {
                if(index + i < lista.length) {
                    list.innerHTML += `
                        <div class="mission-box ${progresso[i] ? 'done' : ''}" id="m${i}">
                            <p>${lista[index + i]}</p>
                            <button onclick="cumprir(${i})" ${progresso[i] ? 'disabled' : ''}>
                                ${progresso[i] ? 'Concluído' : 'Cumpri!'}
                            </button>
                        </div>`;
                }
            }
        };

        window.cumprir = (i) => {
            progresso[i] = true;
            if(progresso[0] && progresso[1]) {
                index += 2;
                progresso = [false, false];
            }
            update(ref(db, 'progresso/' + userType), { index: index, status: progresso });
        };
    </script>
</body>
</html>
